body:
  text: 卷四小兒疹病即大人溫疫風傷衛氣衛閉而營郁營氣內陷則死外發則生非解仲景中風不知溫疫非解溫疫不知疹病疹病之義岐伯仲景俱曾言之而議論未詳後世庸工不知涼營發表而率用寒下徒傷裡氣而衛閉不泄營氣鬱淪遂殞性命庭樹方蘖而遭攀折山木始生而夭斧斤朝榮夕落蕙蘭與蕭艾同傷夏茂秋零松柏共蒲柳先殞半枕黃粱已非故我一榻槐安竟為異物人悉言愁我欲賦恨作疹病解疹病解第四疹病根原疹病者溫疫之傷衛氣也此因金水斂藏衛陽未泄是以風襲於氣分風傷大人則為溫疫小兒則為疹病其病一也而證亦同焉血藏於肝氣統於肺肝血溫暖而升發肺氣清涼而降斂自然之性也氣性閉斂而風性疏泄風傷衛氣泄其皮毛衛愈泄而愈欲斂斂而不啓內遏營血故營鬱而為熱六日經盡營血鬱勃發於汗孔紅點圓平其名曰疹小兒寒水蟄藏相火未泄營血本自清和一襲邪風相火升炎亦同大人故感冒溫疫營鬱而疹發疹點周密營郁散越則熱退而病除矣凡人中風未嘗病疹溫疫之邪膠黏閉塞封固難開小兒肌表固密是以感之則疹生焉疹病之與中風同是風邪但氣則疫癘而時則春夏血蒸而表密故熱散而發疹點證與中風不同也疹病隱顯小兒溫疫傳經亦同大人一日太陽二日陽明三日少陽四日太陰五日少陰六日厥陰六經既盡營血外發而生疹點或發於三日之前或發於六日之後表邪之輕重不同經氣之衰旺非一也蓋衛氣斂閉營鬱熱發外無泄路倘里有奧援則內傳腑臟如臟陰未衰表裡異氣營熱不得內傳經盡之後營熱鬱隆自然外發其經陽素旺則熱盛於三日之前其經陰不衰則熱盛於三日之後邪輕而表疏則外發之期早邪重而表密則外發之期晚若衛閉而營不能泄則鬱悶躁煩昏狂迷亂之證色色皆起遇臟陰素虛則營熱內蒸終不外發五臟燔爍則人死矣或發之未透隱見於皮膚之內鬱而為癢是為隱疹隱疹者營之半發而未透者也隱疹之家營熱鬱積久而肌肉腐潰發為風癩風癩由於隱疹仲景論之於傷寒脈法金匱水氣之中岐伯論之於脈要精微及風論之內而隱疹之名岐伯未言實始仲景此先聖疹論之始也太陽經證發熱頭痛太陽在六經之外感則先病太陽之經總統營衛風自外感而傷衛氣故太陽先病風性疏泄竅閉而風泄之開其皮毛氣莫能斂是以衛傷衛秉肺氣素以收斂為性風傷衛氣皮毛露泄而衛氣愈斂其性然也衛閉而遏營血血中溫氣不泄是以發熱太陽寒水之經病則令氣鬱發證見惡寒溫疫營遏熱盛故但熱而不寒其經自頭下項行身之後營衛壅塞不得順行故頭項腰脊骨節俱痛衛司於肺胸中宗氣衛之根本衛郁竅閉宗氣壅逆逆行上竅泄之不及沖激而出故生嗽嚏衛為風襲遏閉營血營血不達鬱而生熱是衛傷而營病也宜青萍湯浮萍瀉衛氣之閉芍藥瀉營血之郁甘草大棗補其脾精丹皮生薑調其肝氣使風隨汗散衛開而營泄則不生疹病矣以方在太陽血熱不深用表藥發之只是汗出尚無紅斑也青萍湯浮萍三錢芍藥二錢甘草一錢生大棗三枚劈生薑二錢丹皮二錢流水煎半杯溫服覆衣取汗治疫疹初起太陽證之輕者夏月熱甚須以元參佐之脈緊無汗風傷衛氣脈浮頭痛發熱汗出以風泄於外而氣不能閉也若脈浮而緊發熱惡寒身疼腰痛煩躁無汗而喘促者是氣閉於內而風不能泄也溫疫亦然凡風強則疏泄而有汗氣強則斂閉而無汗有汗者輕表疏則營郁易發無汗者重表密則血熱難宣此當以青萍石膏清散經邪是時未傳六經營郁尚淺風消熱泄則斑點不生一汗而解矣青萍石膏湯浮萍三錢石膏二錢生研杏仁二錢泡去皮尖甘草一錢炙生薑二錢大棗二枚流水煎半杯溫服覆衣治疫疹初起太陽證之重者煩熱燥渴疹傳陽明少陽燥動火炎則生煩渴若方在太陽而煩渴已見此其三陽素旺將來多傳陽明之腑蓋溫疫之邪受在少陽厥陰兩經足少陽從相火化氣足厥陰以風木主令胃陽旺而燥盛則風火激烈而煩渴以生脾陰旺而濕盛則風火清寧而煩渴不作如煩渴見於太陽寒水之經則火盛水負濕虧燥盈是其素秉如此矣火炎就燥必傳胃腑此在大人或有表解而病此者小兒表密必連經證宜白虎加元麥青萍湯清金而發表絶其傳腑之源也白虎加元麥青萍湯石膏二錢生甘草一錢知母一錢粳米半杯元參一錢麥冬二錢去心浮萍二錢流水煎至米熟取半杯熱服覆衣治疫疹初起陽氣素旺者寒熱勝負太陽以寒水主令病則令氣遏郁而見惡寒凡太陽經病表陽閉束發熱而惡寒者其常也水旺則寒勝其熱火旺則熱勝其寒君火胎於營血相火者君火之佐也溫疫營鬱熱發動其君相之火火必勝水寒水未至頽敗猶稍見惡寒寒水敗亡則寒從熱化但熱而無寒疹家稍見惡寒者輕但熱無寒者重凡病不宜水旺而寒水之在疹家則貴若拱璧宜補不宜瀉也陽明經證鼻乾口燥嘔吐泄利陽明經在太陽之次太陽表邪不解以次內傳二日則及陽明其經挾口環唇行身之前經氣上壅則鼻口乾燥而胸膈脹滿戊土上逆礙甲木降路甲木鬱遏而賊戊土胃不能容則作吐泄溫疫陽盛陰虛但恐吐泄之亡陰不慮吐泄之亡陽吐泄亡陰則入胃腑吐泄者疹家傳腑之根也青萍葛根湯浮萍三錢葛根三錢石膏二錢元參一錢甘草一錢生薑二錢流水煎半杯熱服治陽明經疹病口燥鼻乾煩熱不眠者青萍葛根芍藥湯浮萍三錢葛根三錢石膏二錢元參一錢甘草一錢生薑二錢芍藥一錢流水煎半杯熱服治疹病陽明經證備而泄利者青萍葛根半夏湯浮萍三錢葛根三錢石膏二錢元參一錢甘草一錢芍藥一錢生薑二錢半夏二錢洗流水煎半杯熱服治疹病陽明經證備而嘔吐者經熱傳腑陽明經病此在大人汗之太過則津亡而入胃腑汗之不及則熱鬱而入胃腑小兒表密不患其多汗之亡津只慮其無汗而熱閉小兒溫疫方在陽明之經法宜透瀉其表以散經熱汗出熱散自無入腑之慮若表邪不解陽旺之人必傳胃腑傳腑則不得不用承氣諸方矣陽明腑證潮熱譫語腹痛便祕傷寒中風一傳陽明之腑腑熱熏蒸開其皮毛則見大汗汗愈泄而土愈燥表病則以汗解而腑病則以汗增疫邪固澀汗出頗難而小兒表密更無自汗表解之理雖傳胃腑而表證自在此與傷寒中風之腑證不同即與大人溫疫之腑證亦殊然有汗無汗之間長幼自別而潮熱譫語腹痛便結之條亦不得迥相懸隔蓋汗亡而土燥與無汗而火鬱皆成腑病殊途同歸無有二也腑陽旺而臟陰虧營熱內蒸不得外發此疹家殞命之原相其輕重瀉以承氣三湯而加養陰涼血之味臟陰續復經熱不能內陷自然外發矣調胃承氣加芍藥地黃湯大黃三錢生甘草一錢生芒硝一錢芍藥二錢生地三錢流水煎半杯入芒硝火化溫服治疹病陽明腑證煩熱譫語便祕者小承氣加芍藥地黃湯大黃二錢厚朴二錢炒枳實二錢炒芍藥二錢生地三錢流水煎半杯溫服治疹病煩熱譫語痛滿便祕者大承氣加芍藥地黃湯大黃四錢芒硝二錢厚朴二錢枳實二錢芍藥二錢生地四錢流水煎半杯入芒硝火化溫服治疹病煩熱譫語痛滿便祕而燥者攻下緩急溫疫非必傳胃腑以其原無內熱只是外感與溫病之內熱素積者不同然營鬱熱盛遇胃家陽旺則表裡感發傳腑甚易雖未必人人傳腑而腑證頗多但用承氣攻下必在表解之後若表證未解須以青萍石膏知母生地清潤腸胃涼瀉肺心而透發其表不可攻下如六日之外經盡腑郁勢不可待乃用下法腑熱既清營郁自發第俟其自發不如承氣之中參以表藥使其腑熱瀉於魄門經熱瀉於汗孔一方而雙解之更為善也庸工不論經腑逢人則下固是錯誤即腑病將成經病未解而遽下於六日之前亦為孟浪小兒脆弱那可肆意如此也白虎加青萍地黃湯浮萍三錢生地三錢石膏二錢知母一錢甘草一錢生粳米半杯流水煎半杯熱服覆衣謂胃承氣加白芍青萍湯大黃三錢芒硝一錢甘草一錢芍藥一錢浮萍三錢生薑二錢流水煎半杯溫服少陽經證目眩耳聾口苦咽乾胸痛脅痞嘔吐泄利少陽經在陽明之次陽明表邪不解以次內傳三日則及少陽其經自頭下項行身之側由胸而走脅肋歸癸水而化相火病則經氣不降逆克戊土戊土被賊不得下行遂與少陽之經彼此纏迫故有心胸痞塞脅肋硬滿之證相火上炎濁氣升突故有口苦咽乾目眩耳聾之條胃腑被逼不能容納水穀故作吐泄少陽居表裡之間陰陽之界陽盛則傳於腑陰盛則傳於臟溫疫營鬱熱旺臟寒不作但有陽盛而傳腑者未有陰盛而傳臟者緣溫疫之病熱在營血而營血之熱全因相火之郁傷寒中風寒熱往來之證至此則第苦熱來而不病寒來以其相火鬱隆寒不勝熱也柴芩栝蔞芍藥湯柴胡三錢黃芩二錢半夏二錢甘草一錢生生薑二錢大棗三枚栝蔞根三錢芍藥三錢流水煎半杯熱服覆衣治少陽疹病目眩耳聾口苦咽乾胸痛脅痞者大柴胡加元參地黃湯柴胡三錢黃芩二錢半夏二錢芍藥二錢枳實一錢大黃二錢生薑二錢大棗二枚元參二錢生地三錢流水煎大半杯溫服分二次治少陽疹病半入陽明胃腑嘔吐泄利者三陽傳胃溫疫三陽經病營鬱熱盛陽旺之人則傳胃腑或自太陽或自陽明或自少陽內傳之來路不一視其腑熱鬱發之早晚也衛統於肺而實化於陽明衛旺營虛皮毛斂澀腑熱燔蒸而表無泄路營郁莫達此疹病所由死也若腑陽非盛營熱不能內傳經盡之後自然外發斑點一生營郁解矣痘家營閉而衛不能發則死疹家衛閉而營不能發則死衛氣之發賴乎陽明營氣之發賴乎太陰故痘家最忌陽明之虛疹家惟恐陽明之旺滋太陽之寒水瀉少陽之相火助己土之濕而潤庚金之燥治陽明腑證之大凡也內外感傷一切百病悉由陽虛不宜潤藥其最宜滋潤者惟有此種多服地黃天冬愈善也太陰經證腹滿嗌乾太陰經在少陽之次少陽表邪不解以次相傳四日則及太陰其經自足走胸行身之前溫疫營鬱熱盛三陰之經化氣於三陽故病傳太陰則腹滿而嗌乾與溫病略同但內熱之新故虛實不同也衛化於陽明營生於太陰陽明旺而太陰衰則衛閉而營不能發太陰旺而陽明衰則營發而衛不能閉營發則斑見而人生衛閉則熱亢而人死疹家斑點發生全賴脾陰之旺滋益脾精以澤燥土疹家太陰之定法內外百病悉緣太陰之濕而惟疹病則惟恐其燥己土非燥營熱不至里蒸終當外發也青萍地黃湯浮萍三錢生地三錢丹皮二錢芍藥二錢甘草一錢生薑二錢大棗三枚流水煎半杯熱服治疹病太陰經證腹滿嗌乾者少陰經證口燥舌乾少陰經在太陰之次太陰表邪不解以次相傳五日則及少陰其經自足走腰行身之後以癸水而化君火少陰百病皆水勝而火負而惟溫疫則火勝而水負故口燥舌乾而渴以其營鬱熱發君相燔蒸一水不敵二火而再值木生火長之時則水虧火盈必然之勢滋益腎水以清壯火疹家少陰之良規也青萍天冬湯浮萍三錢天冬三錢生地三錢元參二錢丹皮一錢生薑三錢栝蔞根三錢流水煎半杯熱服治疹病少陰經證口燥舌乾者厥陰經證煩滿發斑厥陰經在少陰之次少陰表邪不解以次相傳六日則及厥陰六經盡矣其經自足走胸行身之側循陰器而上行故煩滿而囊縮厥陰肝木司營血而胎君火又與少陽相火兩相表裡溫疫之病受在營血營鬱熱發君相之火俱炎傳至厥陰熱盛極矣是時肝血不枯水土滋潤營熱不能內傳外發皮毛自見紅斑經傳厥陰法宜涼營血而滋風木瀉皮毛而清相火也青萍當歸湯浮萍三錢當歸二錢生地三錢丹皮二錢芍藥二錢生薑二錢甘草一錢流水煎半杯熱服治疹病厥陰經證煩滿囊縮而使之發斑者紅白續發紅斑外發則營郁泄越但衛閉未能豁開其發非一次可盡凡欲發斑則生煩躁脈必浮數陸續而出至二三日繼以白斑則透發無遺矣白斑者衛氣之外泄也白斑將發人必煩郁昏暈脈必浮大洪數既發則脈靜人安別無余慮紅斑易生白斑難生非鬱極不能外發將發之時煩亂昏狂困極欲死者往往有之也紫黑遲見疹家斑點外發愈早愈輕衛旺而表密者往往經盡乃發甚有遲至數日之後者大概已過六日便是斑發之期愈遲愈險若營弱不能遽發過時斑見而色變紫黑則多至殞命以其經熱鬱蒸營血腐敗後期而發遂難救藥也於其紫斑隱見未能透發之時速服清散之方猶可挽轉是皆失於發表故至於此出沒隱見疹點透發皮膚之外按陳續生新者已出而舊者未沒此為順證若衛斂表固營弱不能透發隱見皮里頃刻即回此為不救其次則雖不立回而終隱皮里不能透露此為隱疹隱疹之家營鬱熱伏未經表散久而血肉腐潰發生風癩之疾數年之後亦傷性命若早用發表必無此禍也水停腹脹疹家營熱鬱發營藏於肝其病自在厥陰厥陰以風木主令木鬱風盛津血耗傷必生消渴渴而多飲土燥木達者下竅疏泄則水不停留若土濕木鬱疏泄不行必有停水疹點出後水停腹脹者十之八九此緣臟陰素旺不能消水若在痘家便是三陰臟寒之證疹家臟陰不虧則經熱外發反得其益其經熱隆盛臟寒固不發作而積水停瘀必當瀉之其證腹滿脅脹頭目暈眩咳喘氣逆乾燥思飲而水入即吐不能容受以豬苓瀉其積水溲溺一通濁氣下達則眩暈咳喘諸證俱瘳矣豬苓湯豬苓三錢茯苓三錢澤瀉二錢滑石一錢研阿膠一錢炒研流水煎半杯入阿膠消化溫服治疹後水停脹滿咳喘諸證者嘔吐蛔蟲傷寒厥陰有蛔厥之證緣木鬱蠹化故生蛔蟲臟寒不能安蛔故四肢厥逆而吐蛔蟲非第傷寒凡內外百病而見吐蛔必是臟寒惟溫疫則是熱證緣其經熱盛發臟寒必不內作即其臟陰素旺益以飲冷生寒而疹家原不以臟寒敗事雖見吐蛔不與傷寒雜病同論未可溫里只宜涼營發表但不當用寒瀉耳疹後昏憒斑發之後輕者即起重者餘熱未清猶有煩郁譫妄之證再服清散之劑便可慧爽而皮毛已開汗液當泄縱不服藥餘熱自當漸除不過三日之內無不清白靜候亦可莫須多事也疹後泄利疹後泄利全緣土濕水漬以太陰濕旺而渴飲水停木鬱風動行其疏泄水道不開則穀道失斂故生泄利水去土燥泄利自止不須服藥若其不止恐肝脾遏陷致生利病宜以五苓疏木瀉水以燥土濕也五苓散茯苓三錢豬苓二錢澤瀉二錢白朮二錢桂枝一錢研細飲服二三錢日三次服後多飲暖水取汗治疹後泄利渴飲小便不利者疹後膿血疹後泄利不止肝脾郁陷致成下痢膿血之疾庸工謂是疹後餘熱非也此緣土濕木遏郁生下熱膏血腐敗故便膿血宜白頭翁湯清其濕熱加甘草阿膠桂枝茯苓培土清風疏木而瀉濕也白頭翁加甘草阿膠苓桂湯白頭翁三錢黃連一錢黃柏一錢秦皮一錢甘草一錢阿膠二錢桂枝一錢茯苓三錢流水煎半杯入阿膠消化溫服治疹後便膿血者疹後目疾疹後營郁不能透發餘熱傷眼眥爛睛紅久而不愈此肝氣不調之故肝竅於目而司營血血熱未清肝氣抑遏故令病此以涼營達木瀉濕清風之藥調其肝氣木榮風息眼病自瘳芍藥桂苓膠地湯芍藥三錢桂枝一錢生地三錢甘草一錢茯苓三錢阿膠二錢生薑二錢流水煎半杯溫服治疹後目疾六經治法疹家六日經盡血熱外發而見紅斑其在三日之前早服表藥一汗解矣營郁既泄不至發斑若三日之後以至經盡而服表藥血熱已深雖有汗出猶發斑點治法總宜發表前三日則加清金瀉熱之藥後三日則加涼血滋陰之品要以表邪透發經熱肅清為主發之不透餘熱纏綿淫漬種種諸疾為害非小也經腑殊方疹家未病之前原無內熱既病之後亦無內寒陽盛者則有傳腑之條陰盛者則無入臟之證陽盛傳腑則宜寒瀉陽平而不入於腑始終在經者則寒瀉無用但須發表而已善治者在前三陽則以汗解在後三陰則以斑解詳分經腑細斟汗下慎勿在經而用攻下之劑亦莫入腑而用發散之方汗下不謬經腑清平疹家之能事畢矣汗下宜忌痘病寒傷營血營閉而衛郁疹病風傷衛氣衛閉而營郁營開衛發則生痘粒衛開營發則生疹點以營熱散於皮毛故見紅斑而發自汗孔故斑點正圓營熱外發則生內鬱則死其內郁之原必緣陽旺而腑熱腑熱則宜寒瀉但內熱之證尚屬後起其先全是外熱不解陰旺之家終無內郁之熱陽旺之人表裡感應內郁日積遲乃發熱耳陰旺而無內熱者固不可誤清其里即陽旺而內熱未實亦但可涼解表邪未宜遽用寒瀉傷其裡氣病在經絡而攻其臟腑此為粗工若臟陰素旺之人則中氣敗亡而殞性命所關非小庸愚謬妄凡治疹病必用寒瀉已是不通甚且瀉之三日之內方傳陽經之時則無論陽旺陰旺總無是處矣
