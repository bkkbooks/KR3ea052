body:
  text: 卷五伊公丞相文端公之孫大司馬學庭公之子名贊咸字益庵聰明好古博綜百氏而尤愛農黃之學玉楸子解溫疫痘疹四部俱成此前賢所未喻亦先聖之罕言荒荒坤軸落落玄宗室無問字之人門乏好奇之客惟公清規遠鏡洞闢靈臺玄鑑虛凝廓開智府挑銀釭而夜誦卷珠箔以晨披得其寰中超以象外流水是其今日明月乃其前身百年以來一人而已採其清言微旨作四問之篇伊公四問第五伊公問旨癸酉八月玉楸子成四聖懸樞論溫疫痘疹之法少司馬伊公問曰溫疫痘疹四病異同之義云何玉楸子曰感於秋冬謂之傷寒感於春夏謂之溫病溫病者一人之病非眾人所同病也其州里傳染眾人同病者是為疫癘疫分寒溫春夏謂之溫疫秋冬謂之寒疫痘即大人之寒疫疹即大人之溫疫也問溫五條問經所言熱病為何玉楸子曰熱病即溫病也病於春者謂之溫病於夏者謂之熱素問評熱病論先夏至日者為病溫後夏至日者為病暑暑即熱也以時令而異名也問溫病與傷寒何殊玉楸子曰素問熱病者傷寒之類也而實非傷寒傷寒感秋冬之寒溫病感春夏之風時令不同而寒溫異矣問溫病與溫疫何殊玉楸子曰溫病之根得之冬傷於寒而有內熱感則表裡皆病溫疫冬不傷寒而無內熱但是表病陽盛之家而後里病也問冬傷於寒何緣而有內熱玉楸子曰冬氣封藏天地閉塞陽蟄九地之下則寒水得令人於冬時縱欲亡精陽泄而火飛是以變寒而為熱也問冬傷於寒何緣而春必病溫玉楸子曰凡外感之深必因內傷之重陽氣重傷病則寒深陰氣重傷病則熱深表裡熱劇皮毛不開是為溫病蓋衛氣以收斂為性平日內熱鬱伏一遇風邪傷其衛氣衛閉則營郁營血鬱蒸而欲泄於內風氣發揚而欲泄於外內外交泄而衛氣愈斂其性然也斂而不啟乃成溫病春夏風多是以最易感傷若臟腑平和素無內熱則旋感而旋解不成溫病也問疫五條問疫分寒溫前賢不解先生推仲景微義以發眇旨令吾聞所不聞快矣但猶有疑焉秋冬則曰傷寒春夏則曰溫病寒疫亦以秋冬名溫疫亦以春夏名溫病溫疫俱緣中風仲景傷寒所列中風實非春夏之溫病是為何時之邪也玉楸子曰仲景中風秋冬之病也秋冬之月不皆寒天其時日暖風和而病外感自是風淫而非寒邪然究與三春之炎風九夏之溫風氣候迥別故但名中風而不可以為溫熱也問寒疫溫疫感異風寒邪既不同證自懸殊其分別之義安在玉楸子曰風為陽邪而性疏泄寒為陰邪而性閉澀故溫疫之脈浮緩其證發熱而有汗寒疫之脈浮緊其證惡寒而無汗溫疫衛閉而營郁是以經盡而出紅斑寒疫營閉而衛郁是以經盡而發白汗汗者衛氣之所蒸泄斑者營血之所逼現其病解既別其病發亦判不相混也問溫疫得之風邪當與中風同法寒疫得之寒邪當與傷寒同法今溫疫不用桂枝寒疫不用麻黃其法不同何居玉楸子曰春夏溫病秋冬傷寒雖感天地之風寒然不因歲氣之偏至於疫癘陰陽愆伏寒暄錯亂或盛夏而零寒露或隆冬而飄溫風節候乖常是以成疫其分寒溫於冬夏者大略如此而未始盡然固難以桂枝麻黃統治錯雜無定之寒溫也問寒疫溫疫之傳臟腑同乎不同玉楸子曰溫疫有表熱而無裡熱不必傳腑陽盛者裡熱作乃傳於腑寒疫有表寒而無裡寒不必傳臟陰盛者裡寒動乃傳於臟寒疫傳臟未始不入腑其入腑者亦是寒而非熱也溫疫傳腑未始不入臟其入臟者亦是熱而非寒也溫疫非無寒而寒終不勝其熱入腑而病熱者多入臟而病寒者少寒疫非無熱而熱終不勝其寒入臟而病寒者多入腑而病熱者少也問溫疫熱勝法宜清瀉寒疫寒勝法宜溫補否耶玉楸子曰溫疫之熱在表不在裡法宜清散其表熱不必清裡表熱入腑而後用清瀉之劑寒疫之寒在表不在裡法宜溫散其表寒不必溫里表寒入臟而後用溫補之方是當透發表邪非有里證不可誤用攻補後世庸工之於疫癘不論寒溫表裡概用硝黃瀉下十治九誤此助天為虐者也問痘七條問痘始何時書昉何代玉楸子曰黃帝岐伯越人仲景四聖談醫不及痘證然疫癘之疾岐伯於運氣諸篇往往及之痘即大人寒疫未有大人獨病而小兒不病者推其淵源實始上古但先聖未言耳痘書之作則起後世大抵皆趙宋以後之人也問小兒寒疫何為而發豆顆玉楸子曰寒疫營閉而衛郁營開衛泄則為汗疫邪固澀而小兒表密衛氣不能透發故衝突皮膚而發豆粒者使竅開而汗出衛郁泄於皮膚之外不作痘形也問痘粒之豐圓何故玉楸子曰寒邪外閉三日而傳三陽衛郁盛滿發於汗孔外為皮膚所限旁為汗孔所束衛郁發越顆粒充盈不得不豐圓也問痘粒之散漫何故玉楸子曰肺藏衛氣而司皮毛金性收斂衛外而斂皮毛故謂之衛衛盛則皮膚斂束而緻密衛虛則皮膚鬆懈而疏豁衛郁外發沖其皮膚而裹束不緊旁無界限是以散漫而不豐圓也問痘屬外感可以汗解耶玉楸子曰何為而不可也大人寒疫必以汗解小兒不得汗解故發痘粒若可汗解何必以痘解譬如大人強以固表之藥斂之使之不得汗解而以痘解可乎問痘家最恐表虛不能完滿收結今以汗泄衛陽能無後慮玉楸子曰大人汗解不必皆死小兒無汗不必皆生衛虛者汗之亦死不汗亦死衛盛者不汗亦生汗之亦生若用人參黃耆於表藥之中則衛虛可汗而何況實者苟非過汗亡陽保無後慮也問痘書何故而錯謬如是玉楸子曰造化之理非聖不作非明不述百世一聖而至猶接踵千里一賢而生同比肩聖明之少也如是即有聖作必待乎述況後無明者之述即有明述猶須乎作況前無聖人之作以俗子腐生而冒聖作之才以頑民悍夫而僭明述之業此蟪蛄而談春秋朝菌而議晦朔耳何當於是哉問疹四條問生平所觀疹痘之書眾矣無如此之明白清暢犀照無遺者也但小兒痘發而不再病疹則感而又病其義何居玉楸子曰小兒痘病衛氣大發竅隧疏漏復感寒疫則與大人同以汗解故痘不再生小兒疹病即大人溫疫其痘後未嘗不病寒疫則其疹後何能不病溫疫是以可一而可再也問疹病可以汗解乎玉楸子曰寒疫營閉而衛郁溫疫衛閉而營郁營開衛發則為痘衛開營發則為疹營衛透泄皆能作汗痘疹者營衛晚發而不得早泄者也若早發其汗衛郁既泄則痘粒安生營郁既泄則疹點何來既成痘疹悉緣失治原非必生之病胡不可以汗解也問疹病即大人溫疫先生但解溫疫可矣何為又解疹病玉楸子曰溫疫一也而少長大別則證狀亦自微異小兒年齒幼小然或懷質抱真而秉良資大人春秋盛壯然或淳漓樸散而負空器則補瀉溫清之法自難盡同也問小兒疹病既即大人溫疫何疹發之時小兒獨病大人不染耶王楸子曰靈樞九宮八風之篇太乙隨一歲八節而居八方太乙移日天必應之以風雨風從所居之鄉來為實風如冬至後四十六日風自北來夏至後四十六日風自南來主長養萬物從其沖後來為虛風如冬之南風夏之北風也傷人者也僅候虛風而避之故聖人日避虛邪如避矢石邪勿能害風從西方來名曰剛風風從北方來名曰大剛風風從東南來名曰弱風風從南方來名曰大弱風風有剛弱人有少長感以大王之風宋玉風賦少者不傷此大王之雄風也襲以嬰兒之風風從東方來名曰嬰兒風長者不病同聲相應同氣相感自然之理也
