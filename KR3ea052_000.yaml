body:
  text: 自敘天未嘗有生而無殺或以兵荒或以疫癘殺之自天於人何尤然此雖天之過乎抑亦人之罪焉兵荒未必殺人世無良相也疫癘未必殺人世無良醫也相而不良其罪小醫而不良其罪大魏晉以來至於今日疫癘之殺人多矣其書數十百部其徒數千百人病則家不得免藥則戶不能逃最可恨者小兒之痘疹即大人之疫癘愚妄不以為歲氣而以為胎毒哀此百萬生靈既困天災復加人禍民有兩死而無一生籲其悲矣天地不仁不過以百姓為芻狗愚妄不仁遂至以蒼生為魚肉此怨天乎抑尤人乎仲景先師創內外感傷之法而未言疫癘其言之彰明而較著者人猶有未解況其未言者與何怪於群兒之訛謬耶僕於己巳春初草四聖懸樞析溫疫痘疹之義辛未六月筆削於清江河院暑中四部俱成傷寒之義元矣疫癘之義元之又元慨夫上士十載悟玄下士見之大笑以為尚白其於閎意眇旨玄而白之其於沉辭浮藻白而玄之此黑之懸彼白之募是墨以為明而狐以為蒼也楊朱之弟黑出而白入其狗吠焉楊朱之狗黑往而白來其弟怪焉茲蒼黃之未變又黑白之不分世無楊朱之弟矣世亦並無楊朱之狗也往有楚士而官於齊者聚書數車襲故紙以談岐黃覽茲玄解胡盧而笑吳牛之喘未見月也蜀犬之吠未見日也吾安得進吳蜀之犬牛登泰嶽凌清浮與之抑日月之光華哉昔子云草玄侯芭從而受業桓談以為絶倫今宇內之大諒必有侯桓其人吾將藏之深山虛坐以待矣壬申十月昌邑黃元御
