body:
  text: 卷一時分冬夏病殊寒溫氣候不同感傷亦異傷寒著於仲景溫病闡於岐伯各有妙解水火判然自叔和混熱病於傷寒傷寒之理既永晦於千古溫病之義亦長訛於百代後世庸工紛起殺運宏開當鼓橐吹爐之際何須覆鼎值焦頭爛額之秋那堪入甕橫覽夭枉愴恨實多作溫病解溫病解第一溫病名義秋冬感冒名曰傷寒春夏感冒名曰溫病病於春者謂之溫病於夏者謂之熱溫熱同病因時異名素問熱論先夏至日者為病溫後夏至日者為病暑是也四時之候秋涼冬寒春溫夏熱約而言之不過陰陽陰陽之氣不過寒熱寒盛於冬熱盛於夏秋之涼者將寒而未寒也春之溫者將熱而未熱也感於冬者謂之傷寒感於夏者謂之病熱感秋之涼輕於傷寒而實傷寒之屬也感春之溫輕於病熱而實病熱之屬也故秋冬之感證統曰傷寒春夏之感證統曰熱病仲景之言傷寒兼秋月之傷涼也素問之言熱病兼春月之病溫也附岐伯溫義素問熱論黃帝問曰今夫熱病者皆傷寒之類也或愈或死其死皆以六七日之間其愈皆以十日以上者何也熱病者傷寒之類非傷寒也岐伯對曰人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病者必不免於死外感之病統曰傷寒而其中實有風寒之分春溫夏熱皆感風邪而曰傷寒者感病之總名也上文曰熱病者傷寒之類則溫熱非由傷寒甚明人之春夏感傷風泄其衛衛閉而遏營血則為病熱熱雖至甚而經盡陰復不至於死其陽亢陰枯外被邪客而表裡雙傳一日兩經是謂兩感精液消亡必不免於死也帝曰願聞其狀岐伯曰傷寒一日巨陽受之巨陽者諸陽之屬也故為諸陽主氣也其脈連於風府故頭項痛腰脊強二日陽明受之陽明主肉其脈挾鼻絡於目故身熱目痛而鼻乾不得臥也三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾三陽經絡皆受其病而未入於臟者故可汗而已足之三陽自頭走足傷寒一日太陽受之太陽者諸陽之所屬也故為諸陽主氣也太陽行身之後其脈自頭下項挾脊抵腰連於督脈之風府邪自風府而入客於太陽之經故頭項痛腰脊強二日陽明受之陽明行身之前其脈挾鼻絡於目故目痛鼻乾三陽之氣皆隨陽明下行陽氣蟄藏則善寐陽明上逆陽升而火泄故身熱而不臥三日少陽受之少陽行身之側其脈從耳下頸自胸貫胭而循脅裡故胸脅痛而耳聾三陽經絡皆受其病而未入於三陰之臟者經鬱熱發汗之開其皮毛經熱外瀉則病愈矣四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮足之三陰自足走胸四日太陰受之太陰行身之前其脈入腹絡胃上膈挾咽故腹滿而嗌乾五日少陰受之少陰行身之後其脈貫脊屬腎入肺而系舌本故口燥舌乾而渴六日厥陰受之厥陰行身之側其脈過陰器抵少腹挾胃屬肝絡膽故煩滿而囊縮太陰曰脈布胃中少陰曰脈貫腎厥陰曰脈絡於肝是三陰之病皆入於臟也其不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病日已矣六日而六經俱盡六日而六經俱解所謂其愈皆以十日以上也帝曰治之奈何岐伯曰治之各通其臟脈病日衰已矣其未滿三日者可汗而已其已滿三日者可瀉而已腑亦稱臟素問十二臟相使論十二臟之貴賤相使是也五臟六腑皆受病矣各通其臟脈是何臟腑之病即針通其何臟腑之脈也其未滿三日者所謂三陽經絡皆受其病而未入於臟故可汗而已其已滿三日者已入於臟故可瀉而已汗瀉俱是刺法詳見刺熱篇靈樞熱病熱病三日而氣口靜人迎躁者取之諸陽五十九刺以瀉其熱而出其汗實其陰以補其不足瀉之則熱去補之則汗出熱病陽有餘而陰不足故瀉其陽以補其陰其在三陽而未入臟者熱邪尚淺補其經中之陰則汗自出其在三陰而己入於臟者熱邪已深非泄其臟中之陽則熱不去溫熱之病所以不死者臟陰之未亡也已入臟而不泄則臟陰亡矣故用瀉法帝曰其兩感於寒者其脈應與其病形何如岐伯曰其兩感於寒者病一日巨陽與太陰俱病則頭痛口乾而煩滿二日陽明與少陰俱病則腹滿身熱不欲食譫語三日少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死三陰三陽五臟六腑皆受病營衛不行五臟不通則死矣帝曰五臟已傷六腑不通營衛不行如是之後三日乃死何也岐伯曰陽明者十二經脈之長也其血氣盛故不知人三日其氣乃盡故死矣兩感者陽強不密陰氣衰絶其太陽之寒隨少陰而化熱太陰之濕隨陽明而化燥厥陰之風隨少陽而化火故一日之內兩經俱病經其表裡同氣故感應神速三日六經俱病再三日而陽明之氣全消是以死也附仲景溫義仲景傷寒太陽病發熱而渴不惡寒者為溫病若發汗已身熱灼者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火熏之一逆尚引日再逆促命期傷寒陽乘陰位衛氣內鬱則發熱熱傳陽明金土枯燥則作渴陰乘陽位營氣外閉則惡寒故太陽傷寒未傳陽明則有寒熱而無渴證若病在太陽發熱作渴而不惡寒此非傷寒是謂溫病溫病之家陽盛陰虛津血枯稿最忌汗下火攻若發汗亡陰身熱如灼火烈風生名日風溫風溫為病陽亢陰絶其脈尺寸俱浮毛蒸里泄常自汗出清氣消亡身體重濁膽熱傳胃土困則多眠睡鼻息粗重必作鼾聲機關燥澀語言難出是皆誤汗之證也若被下者亡其腎陰小便不利血枯金燥直視不轉風木疏泄溲溺遺失是皆誤下之證也若被火者病微則肌肉熏蒸而發黃色病劇則水枯木燥肝膽失榮魂氣震蕩形如驚癇筋脈伸縮時作瘛瘲肌膚焦黑色若煙燻是皆誤火之證也凡若汗若下若火皆為逆治一逆尚延引其時日再逆則催促其命期矣溫病根原素問陰陽應象論冬傷於寒春必病溫生氣通天論陰陽之要陽祕乃固陽強不能密陰氣乃絶陰平陽祕精神乃治陰陽離決精氣乃絶因於露風乃生寒熱是以冬傷於寒春必病溫金匱真言論夫精者身之本也故藏於精者春不病溫四時之氣春生夏長秋收冬藏木火旺於春夏而司生長金水旺於秋冬而司收藏而金水之所以收藏者則精魄之能也精以至陰而主藏魄者精之始基但能收而未能藏是以蟄藏之職獨歸於精藏氣得令相火蟄封腎精溫暖是謂陽密少陰癸水與太陽壬水兩相表裡皆主蟄藏癸水之藏以其溫也壬水之藏以其寒也五行之氣熱則發宣寒則凝閉癸水之溫而善藏者壬水之寒而善閉也人於冬時宜順寒水之令以藏陽氣陰精失藏相火泄露陽根不密是謂冬傷於寒冬傷於寒者傷其寒水蟄藏之令氣也相火升炎久而彌盛春氣一交陽根盡泄變木為火化溫成熱是以春月而行夏令也天時之寒暄奠定人竅之啓閉無常一遭風露侵凌溫病作矣春時不病至夏而感是謂熱病冬時不病者寒水司氣雖蟄藏失政而經絡臟腑之熱究未如春夏之盛也病原同異溫病之原起於冬不藏精傷其寒水之令故春夏病感必是內熱但冬傷於寒春夏必病溫熱而春夏之溫熱不必皆冬傷於寒其冬傷於寒而病溫熱者自是內熱其不冬傷於寒而病溫熱者未可定謂之內熱也病與溫疫相同而法亦無殊其營鬱熱發而又病於春夏之間固無入臟生寒用四逆真武之證然燥渴飲冷積水不消者亦未嘗少此皆不可用涼瀉之法也風寒異邪四時感傷之因有風有寒寒者天地之陰氣風者天地之陽氣陽主開陰主闔傷於寒者皮毛開而寒束之故竅閉而無汗中於風者皮毛閉而風泄之故竅開而有汗氣統於肺金性清涼而降斂血司於肝木性溫暖而升發肺氣清降則竅闔肝血溫升則竅開人之汗孔秋冬則闔者氣清而斂之也春夏則開者血溫而發之也秋冬竅闔而有時偶開則寒氣傷之春夏竅開而有時偶閉則風氣中之此四時之邪感傷之因也營衛殊傷肺藏衛氣肝藏營血寒則傷營而不傷衛以衛氣肅靜孔竅闔而寒莫由入是以不傷唯血溫而竅開乃傷於寒風則傷衛而不傷營以營血蒸動孔竅開而風隨汗解是以不傷唯氣涼而竅闔乃傷於風然寒傷營血而病則在衛以營性升發一被寒邪闔其皮毛則營愈欲發外乘陽位而束衛氣故衛閉而惡寒風傷衛氣而病則在營以衛性降斂一被風邪開其汗孔則衛愈欲斂內乘陰位而逼營血故營鬱而為熱胃為戊土乃衛氣變化之原傷寒之病戊土與金水受之金水司氣隨戊土而下降以陽體而胎陰魄故氣常清降而外斂傷寒而氣反內郁是以病在氣分脾為己土乃營血滋生之本中風之病己土與木火受之木火主血隨己土而上升以陰體而抱陽魂故血常溫升而內發中風而血不外達是以病在血分氣清而孕水故氣病則寒盛而為傷寒血溫而孕火故血病即熱盛而為溫病秋冬之感皆是傷寒其時非必無風中於風者便是秋冬之溫病春夏之感皆是中風其時非必無寒傷於寒者便是春夏之寒病究竟秋冬寒多而風少故往往病寒春夏寒少而風多故往往病溫時令不同也傳經大凡一日一經六日經盡凡諸感病之大凡也若傷寒若中風若溫病熱病若溫疫寒疫若痘病疹病無不皆然但溫熱必傳臟腑余則病由外感原無內熱不必定傳臟腑耳程氏郊倩謂溫病傳經傷寒中風不傳經其論全非唯兩感之家一日兩經則溫熱之所獨有而諸感病之所無也太陽經證頭痛熱渴太陽以寒水主令手太陽以丙火而化氣於寒水陰盛則壬水司氣而化寒陽盛則丙火違令而化熱故太陽以寒水之經而易於病熱溫病之家冬不藏精相火升泄傷其寒水閉蟄之氣火旺水虧由來已久及其春夏病感衛陽閉祕營熱鬱隆寒水之氣愈虧故受病之一日即發熱作渴而不惡寒也太陽在六經之表故感則先病其經自頭下項行身之背故頭項痛而腰脊強肺主衛肝主營而總統於太陽太陽之經在皮毛之部營衛者皆皮毛之所統轄也溫病衛閉而營郁法當清營熱而瀉衛閉一日之初衛閉己見營熱方生故一日太陽之治宜涼金補水而開皮毛不易之法也玄霜丹浮萍三錢麥冬三錢甘草二錢炙元參三錢丹皮三錢芍藥三錢生薑三錢切大棗三枚劈流水五杯煎大半杯熱服覆衣飲熱稀粥取少汗治一日太陽溫病頭項痛腰脊強發熱作渴者陽明經證目痛鼻乾陽明以燥金主令足陽明以戊土而化氣於燥金太陰勝則陽明化氣而為濕陽明勝則太陰化氣而為燥故陽明之經易於病燥溫病冬水失藏相火升炎胃津既涸脾精亦亡太陰之濕久化陽明之燥春夏病感衛陽遏閉營熱鬱發土焦金燔燥氣愈甚其經挾鼻絡目行身之前故目痛鼻乾而身熱不臥陽莫盛於陽明燥熱在經不得泄路遲則胃腑積熱因表鬱而內應腑熱一作臟陰漸枯便伏異日死機於其腑熱未動之時涼瀉經絡以清其熱則後患絶矣素雪丹浮萍三錢石膏三錢元參三錢葛根三錢甘草二錢炙丹皮三錢芍藥三錢生薑三錢切麥冬三錢流水六杯粳米半杯煎大半杯去渣熱服覆衣飲熱稀粥取少汗治二日陽明溫病身熱目痛鼻乾不臥胸燥口渴者嘔者加半夏三錢人參白虎湯石膏五錢知母三錢人參三錢甘草二錢生薑三錢粳米半杯流水煎大半杯熱服覆衣取少汗溫病二日方傳陽明之經腑熱未作法宜清熱而發表熱甚者必傷肺氣當用人參白虎湯清金瀉熱益氣生津乃為善法少陽經證脅痛耳聾少陽以相火主令足少陽以甲木而化氣於相火順則下蟄而溫腎水逆則上炎而刑肺金故少陽之經最易病火溫病寒水失藏相火炎蒸已旺於衰廢之時春夏病感衛閉營郁熱盛火發勢當得令之候愈極燻赫少陽傷寒有寒熱之往來以二陽在表三陰在裡陽勝則熱陰勝則寒少陽居表裡之半是以寒往而熱來溫病三陰經氣從陽化熱故但熱而無寒其經絡耳循脅行身之側故胸脅痛而耳聾火曰炎上炎上作苦故咽乾而口苦相火內郁則肺金受刑甲木內郁則刑胃土外無泄路勢必焦土流金而入陽明當以清涼和解之法散其炎烈也紅雨丹柴胡四錢黃芩三錢芍藥三兩石膏三錢甘草三錢丹皮三錢生薑三錢切元參三錢流水煎大半杯熱服覆衣飲熱稀粥取微汗治三日少陽溫病胸脅疼痛耳聾口苦咽乾作渴者三陽經絡皆受其病而未入於臟腑者法應汗之而溫病與傷寒中風寒暄異氣不宜麻桂辛溫以清潤之劑涼瀉經絡燥熱方是溫病汗法其傷在衛氣而病在營血營熱鬱發故用丹皮白芍瀉熱而涼營也三陽傳胃傷寒中風病於秋冬之際原無內熱表邪不解陽盛則傳陽明之腑陰盛則傳太陰之臟陰陽平和則不入臟腑始終在經六日經盡則汗解矣溫病內熱素積斷無但在經絡不傳胃腑之理緣其經熱鬱隆外泄無路而胃腑積熱自當感應而發但胃熱大作必在三日之後經熱不解而後腑熱鬱勃此自然之層次病由外感是以表熱先發也其在三日之內表邪郁迫裡熱方生但當發表未可攻裡表氣疏泄裡氣自平若三日之外腑熱已作則攻瀉之法乃可續用蓋胃土燥熱必爍臟陰其肺脾津液肝腎精血久為相火煎熬益以燥熱燔蒸臟陰枯竭則人死矣是宜滋其臟陰瀉其腑熱勿令陽亢而陰亡矣白英丹大黃五錢生芒硝三錢甘草一錢炙枳實二錢炒厚朴三錢炒元參三錢麥冬八錢丹皮三錢芍藥三錢生地三錢流水煎大半杯熱服陽明戊土位居三陽之長陽盛之極必皆歸宿陽明而入胃腑溫病三日之外三陰臟病悉以胃熱為之根本雖曰五臟六腑皆受病而陽明胃腑實其綱領也其裡熱發作不拘在何臟腑總以瀉胃為主而兼清本部但腸胃未至燥結則第滋陰不須承氣即燥結未甚亦當俟之六日經盡之後腑邪內實用瀉熱滋陰之法一下而清矣若燥熱隆盛則三四五日之內俱可瀉下是當用傷寒急下之法不可循傷寒緩攻之條以其內熱鬱伏原與傷寒不同也太陰經證腹滿嗌乾太陰以濕土主令手太陰以辛金而化氣於濕土陽明盛則太陰化氣而為燥太陰盛則陽明化氣而為濕故太陰之經最易病濕然外感風寒以及內傷百病其在太陰無不是濕而惟溫病之在太陰則化濕為燥以其冬水失藏相火泄而脾陰爍也春夏病感營鬱熱旺濕氣自當愈耗其經布胃絡嗌故腹滿而嗌乾太陰之濕奪於陽明之燥脾陰枯稿則腎肝精血俱難保矣是宜清散皮毛瀉陽明之燥而滋太陰之濕也黃酥丹浮萍三錢生地四錢甘草二錢炙丹皮三錢芍藥三錢生薑三錢流水煎大半杯熱服覆衣治四日太陰溫病腹滿嗌乾發熱作渴者少陰經證乾燥發渴少陰以君火主令足少陰以癸水而化氣於君火陽盛則丁火司權而化熱陰盛則癸水違令而生寒故少陰以君火之經而最易病寒然外感風寒以及內傷百病其在少陰無不是寒而惟溫病之在少陰則化寒為熱以其冬不藏精水虧火泄春夏病感更值火旺水虛之候其經貫腎絡肺而系舌本故口燥舌乾而渴腎者主水人身水火對列水枯而火亢則人亡矣是宜清散皮毛瀉君火之亢而益腎水之枯也紫玉丹浮萍三錢生地四錢知母三錢元參三錢甘草二錢天冬三錢生薑三錢流水煎大半杯熱服覆衣治五日少陰溫病口燥舌乾發熱作渴者厥陰經證煩滿囊縮厥陰以風木主令手厥陰以相火而化氣於風木治則木達而化溫病則火鬱而生熱以厥陰乙木原胎丁火故厥陰之經最易病熱溫病衛閉而遏營血營郁是以發熱而營藏於肝則溫病之來實受於厥陰方其隆冬火泄營血已傷勢將騰沸春夏病感衛閉營遏血熱自當愈劇其經循陰器而絡肝故煩滿而囊縮手厥陰之火扇以足厥陰之風風烈火炎煎迫營陰營血枯稿則命殞矣是宜清散皮毛瀉相火之炎而滋風木之燥也蒼霖丹浮萍三錢生地四錢芍藥三錢生當歸三錢丹皮三錢甘草二錢生生薑三錢流水煎大半杯熱服覆衣治六日厥陰溫病煩滿囊縮發熱作渴者三陰入臟岐伯溫病治法未滿三日者可汗而已其滿三日者可瀉而已三陽經絡皆受其病而未入於臟者故可汗而已溫病內熱蓄積交春夏而受感傷內熱鬱隆原無但傳經絡不傳臟腑之理第傳臟傳腑必在三日之外其未滿三日則但在經絡故曰三陽經絡皆受其病而未入於臟在經是以可汗若三日之外則必入於臟既入於臟則無不入於腑矣故曰五臟六腑皆受病入臟入腑是以可瀉以陽盛於外而根於內三日之內病在三陽陽盛於外故但是經熱而已三日之外病入三陰而臟陰消爍已化亢陽則非止經熱而已也積熱鬱伏是以內傳臟腑耳臟腑治法臟以太陰為主所謂脾者孤臟以灌四旁也腑以陽明為主所謂陽明者五臟六腑之海十二經脈之長也足太陰以濕土主令足陽明從燥金化氣溫病陽明之燥劫奪太陰之濕滋太陰之濕而瀉陽明之燥固已而推原太陰土濕之所由來實原於水而腎水之所以枯稿一耗傷於燥土一盜泄於風木治法以麥冬潤陽明之燥以地黃滋太陰之濕以知母元參天冬清金而壯少陰之水以當歸丹皮白芍潤木而息厥陰之風而地黃之性滋濕清風兼而能之故三陰並宜地黃泄陽助濕至下之品至於溫病土燥而木枯則反為靈寶莫佳於此矣汗瀉之法溫熱之病陽強陰弱岐伯立法則曰汗瀉仲景垂戒則曰汗下義若不同而理實無殊岐伯之示汗瀉補陰而瀉陽也仲景之戒汗下瀉陽而亡陰也後世通岐伯之針刺效仲景之湯丸易麻桂之溫燥汗之以清涼之劑變承氣之蕩滌瀉之以滋潤之品壯火既清微陰續復則悉得岐伯之遺法而不犯仲景之明戒矣岐伯論溫於刺熱篇云治諸熱病飲之寒水乃刺之必寒衣之居止寒處身寒而止也仲景論溫但戒汗下火劫未嘗立法究竟溫病治法不離汗瀉兩義但須清涼滋潤而已會岐伯仲景之義於一百一十三方中選而用之有汗法焉暍病之人參白虎是也金匱方中有瀉法焉百合病之百合地黃是也由此二法而變通之法不勝窮矣
