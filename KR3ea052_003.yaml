body:
  text: 卷三小兒痘病既大人寒疫寒傷營血營閉而衛郁衛氣外發則生內陷則死非解仲景傷寒不知寒疫非解寒疫不知痘病但以先聖無言古經闕載後世庸工未燭厥理涉水迷津鑿山罔道靈關弗啓玄鑰難開篇章纍架悉憑虛公子之言著作連箱皆烏有先生之論致令孩提不祿襁負夭亡方出人關已登鬼録縱使昔之壽民且為今之殤子痛此億萬嬰童橫罹冤酷怛然悲惋心折骨驚作痘病解痘病解第三痘病根原痘病者寒疫之傷營血也此因木火發泄營陰不斂是以寒侵於血分寒傷大人則為寒疫小兒則為痘證其病一也而證則異焉氣統於肺血藏於肝肺氣清涼而降斂肝血溫曖而升發自然之性也血性宣揚而寒性閉澀寒傷營血閉其皮氣營愈閉而愈欲發發而不透外束衛氣故衛鬱而為熱六日經盡衛氣鬱隆發於汗孔形同豆粒是以名痘小兒寒水蟄藏相火未泄皮毛之密異於大人故感冒寒疫衛鬱而痘發痘粒圓滿衛郁散布則熱退而病除矣小兒未嘗不感傷寒而未始病痘至寒疫之邪纏綿固澀最難解散小兒肌膚斂密感之則痘生焉嶺南塞北不見此病地暖則孔竅不閉地寒則皮毛不開故感而不傷也痘病消長小几寒疫傳經亦同大人一日太陽二日陽明三日少陽四日太陰五日少陰六日厥陰六經俱盡衛氣外發而生痘粒一經之郁散則一經之病解七日太陽病衰八日陽明病衰九日少陽病衰十日太陰病衰十一日少陰病衰十二日厥陰病衰衛氣盡達而痘愈矣陽盛者經陽司氣而熱鬱於外陰盛者臟陰當權而寒鬱於內陽盛則紅白而起發陰盛則紫黑而塌陷以陽長而陰藏其性然也起發則生塌陷則死故陰不可長而陽不可消陽莫盛於陽明陰莫盛於少陰陽盜則陽明之經病也陰盛則少陰之臟病也臟陰太盛寒及於經而絡中之陽亦消經陽太盛熱連於腑而臟中之陰亦耗臟寒則宜溫補而腑熱不可寒瀉補則衛發而痘長瀉恐衛陷而痘消明於消長之理崇陽明而黜少陰痘家不易之法也仲景傷寒少陰之篇少陰負趺陽者為順也趺陽胃脈實痘病之玉策金繩也熱吉寒凶痘發於陽盛而外熱陷於陰盛而內寒是以感病之時熱甚者吉熱微者凶發熱三日三陽之盛也發熱二日則太陽之陽虛故一日不熱發熱一日則陽明之陽虛故二日不熱陽虛則衛郁不發即暫時略發而究不茂長終必塌陷一入三陰之臟熱退寒生死不可醫矣陽貴陰賤凡病皆然至於痘家尤為甚焉陰貴之證除溫病溫疫傷寒陽明實證外他未嘗有也是以三陽之經熱痘家之生途而一見少陰之寒來即寓死機恐其寒來而熱不繼發也三陰之臟寒痘家之死路而一見厥陰之熱發即為佳兆喜其熱發而寒不再來也其陽復而熱過者疳蝕癰潰不無後患然既已出死路而登生途縱治法乖違未免損傷究為肢體殘缺之人猶勝作官骸周全之鬼也抑陰扶陽痘家自始至終全賴陽旺陽減一分則其異時發達收結必有一分缺缺其甚則紅紫凹塌而衛氣不升其次則灰色平陷而衛氣不長其次則泡殼空虛而衛氣不充其次則皮膚脆嫩而衛氣不斂衛有不到之處即人有危亡之憂縱毫無缺缺痂退病除而瘢色老嫩猶關性命黑者上吉紅者無慮白者終凶黑者陽旺而熱盛也紅者陽平而熱調也白者陽虛而熱敗也凡見諸證當竭力扶陽以挽末路惟煩熱頻作痘色枯焦此少陽相火之旺厥陰風木之郁緣木司營血而主色澤血虛不能華色而風木消爍愈失光潤故見枯焦宜以柴胡黃芩地黃芍藥瀉相火而滋風木肌膚自華原非下證痘家誤服硝黃而反起發豐潤者正是此種此是誤用而誤效雖能奏效究竟是誤庸工見其偶效以為痘有下證死有餘辜者也太陽經證頭痛腰痛發熱惡寒嗽喘嚏噴太陽在六經之外皮毛之分次則陽明次則少陽次則太陰次則少陰次則厥陰近於骨矣衛司於肺營司於肝營行脈中衛行脈外而總統於太陽寒自外感而傷營血故太陽先病寒性閉澀竅開寒入閉其皮毛血不得泄是以傷營陰內陽外氣之常也寒傷營血皮毛閉塞營陰欲泄膚無透竅外乘陽位束其衛氣衛氣內郁則遏閉而為熱營血外束則收藏而為寒陰陽易位彼此纏迫故發熱而惡寒也太陽之經自頭下項行身之後經氣迫束故頭項腰脊骨節俱痛也皮毛外闔肺氣壅遏逆行上竅泄之不及故嗽嚏喘促也營血遏郁木氣不暢肝木不升則振撼而為悸膽木勿降則懸虛而為驚也足少陽行於耳後手厥陰行於中指少陽之相火上逆故耳後筋紅厥陰之相火下陷手厥陰亦為相火故中指節冷也營為寒侵束閉衛氣衛氣不達鬱而生熱是營傷而衛病也宜紫蘇湯蘇葉發其皮毛杏仁利其肺氣桂枝通經而行營血甘草培土而補中氣使寒隨汗散營開而衛泄則不生痘病矣紫蘇湯蘇葉三錢桂枝一錢杏仁二錢泡甘草一錢炙流水煎半杯熱服覆衣取汗治小兒寒疫太陽經證而未成痘者冬月寒盛須以麻黃髮之陰陽盛衰太陽一經三陽三陰之綱領也陽盛則外傳三陽之經陰盛則內傳三陰之臟陽盛者三陽當令經熱外發則臟陰退避而內寒不生陰盛者三陰司權臟寒內動則經陽敗沒而外熱不作陽盛則善長故紅腫而外發陰盛則善藏故黑塌而內陷外發則衛氣升達而人生內陷則衛氣淪亡而人死陽盛者順陰盛者逆自然之理也究之病在太陽不早解表寒其內傳六經衛郁痘發已為順中之逆若於痘形未見之先早以表藥解之令其寒散衛泄痘粒不生是為順中之順也庸工謬妄以為臟腑之毒不知解表而又以寒瀉敗其胃氣小兒夭枉千載奇冤此輩穰穰何可勝誅也停水不消太陽膀胱職司水道陽衰土濕之家水不歸壑乘表寒外閉里水鬱發逆行陽位客居心下或原無停水而渴飲茶湯蓄積不化水氣阻格肺胃不降多生嘔噦咳喘之證肝脾不升多有泄利淋澀之條水旺則火土雙敗異日黑陷之基實伏於此是宜表裡雙解之蘇桂姜辛湯蘇葉瀉其衛氣桂枝行其營血甘草培土芍藥瀉木半夏細辛乾薑五味降沖逆而止咳嘔裡氣調而表郁宣積水化汗泄於皮毛矣蘇桂姜辛湯蘇葉三錢桂枝一錢甘草一錢芍藥一錢半夏二錢洗細辛一錢乾薑一錢五味一錢流水煎半杯熱服覆衣治太陽經證痘未發而有水氣停阻者若下利加赤石脂一錢若渴者去半夏加栝蔞根二錢若小便不利加茯苓二錢若喘者加杏仁一錢若噫者加附子一錢煩渴發熱太陽未傳陽明不作煩渴內連陽明衛郁發熱而外泄無路煩渴乃生以胃腑燥氣因表鬱而里應也此在大人或有表解而病此者小兒不得汗泄必連表證宜白虎加元麥紫蘇湯清金而發表氣虛者加人參以益氣防其渴止陽亡而衛氣虛敗也白虎加元麥紫蘇湯石膏二錢生知母一錢甘草一錢粳米半杯元參一錢麥冬三錢去心紫蘇三錢流水煎至米熟取半杯熱服覆衣治太陽經證未解而見煩渴者人參白虎加元麥紫蘇湯石膏一錢知母一錢甘草一錢粳米半杯人參一錢元參一錢麥冬三錢紫蘇三錢流水煎至米熟取大半杯熱服覆衣治證同前而氣虛者寒疫之證臟腑亦生濕寒燥熱者頗少小兒相火未泄陽旺之人多有此證白虎法不可不備也血升鼻衄太陽未傳陽明衛郁非盛尚無衄證一傳陽明衛氣鬱遏經絡勿容逆循鼻竅沖逼營血則見衄證衄則衛郁升泄痘可不生然衄解較之汗解損傷頗重且恐衛郁不盡發泄而衄後陽虛痘不茂長則反壞大事於其脈浮發熱鼻燥口乾衛郁欲衄之時以紫蘇石膏地黃湯瀉衛鬱而涼血蒸表解汗泄則衄證免矣紫蘇石膏地黃湯蘇葉三錢桂枝一錢杏仁一錢甘草一錢石膏一錢生地一錢麥冬三錢丹皮一錢生薑一錢大棗一枚流水煎半杯熱服覆衣治太陽將傳陽明脈浮發熱鼻燥口乾欲作衄證者陽明經證嘔吐泄利陽明之經在肌肉之分皮毛之內太陽經病以次相傳二日則及陽明其經挾口環唇行身之前經氣上壅故鼻乾口燥而胸滿胃者水穀之府一傳陽明必見吐泄以少陽甲木從陽明戊土下行表寒束迫陽明經氣不能順降壅礙甲木下行之路甲木鬱遏而賊戊土胃腑被逼失其容受之量水穀在中脘以上者則為嘔吐在中脘以下者則為泄利嘔利者入腑入臟之先機也陽明胃腑從燥金化氣太陰脾臟以濕土主令陽盛則嘔泄亡陰入腑而生熱陰盛則吐利亡陽入臟而生寒寒疫之病大人衛泄而汗解小兒衛發而痘生全恃乎胃陽盛而燥氣長也於其嘔泄方作之時扶陽明而抑太陰一定之法也紫蘇葛根升麻湯蘇葉三錢葛根二錢桂枝一錢芍藥一錢甘草一錢升麻一錢流水煎半杯溫服治陽明經泄利者紫蘇葛根半夏湯蘇葉三錢葛根三錢桂枝一錢芍藥一錢半夏二錢生薑一錢甘草一錢流水煎半杯溫服治陽明經嘔吐者發熱出痘粒滿痂生小兒痘證原於衛郁衛陽極盛而後外發陽莫盛於陽明表寒外束陽氣鬱隆是以發熱日傳一經而至少陽三陽俱病衛郁盛發故發熱三日而見痘形四日太陰五日少陰六日厥陰正陽當令六經俱周三陽不消三陰不長衛氣鬱滿經脈莫容既無內陷之竅自當外尋出路而發於汗孔汗孔一開衛氣外泄則為汗寒束竅閉汗孔莫開衛氣升騰衝突皮膚穹隆起發是以成痘痘者衛郁外發而不得汗泄者也此在大人經脈疏闊而衛氣虛損六日之內滿而不實經盡之後又能汗解故無痘證小兒衛盛陽滿竅隧緊密外感寒淫肌表不泄與大人同病而證狀懸絶發為顆粒此痘病之原由也衛氣莫泄發越豐隆再三日而痘粒完滿再三日而衛郁透徹痂生熱化病退而人安矣凡諸瘡痱血肉腫潰膿成必泄痘粒之腫不關血肉只是衛氣衝騰皮膚泡起經陽升發氤氳靉靆影影如漿其實非膿經熱外爍皮膚焦結痂落皮損是以成麻計其起落十有二日而後病愈大人病此多愈於六七日之間者六經既遍邪退正復自能汗解小兒無汗衛氣不泄是以再加六日衛郁發盡結為痘證粒滿痂生而後病退其衛盛者六七八日經盡而即起其衛虛者十七八日三經周而後平也紅白消長痘病衛郁營內外發則生內陷則死而其外發之權全賴乎陽明之經營生於太陰衛化於陽明肝藏血而脾乃生血之本肺藏氣而胃為化氣之原也營內衛外自然之位寒傷表閉衛氣不得外行而反內郁營血不得內守而反外束衛氣發於營血之內是以痘粒初生營血包裹全是紅色太陰虛而陽明盛則衛陽外發而營不得閉方其初發重圍未透營血朦朧紅不遽退及其升發散越透徹無郁營陰退落紅線繞根光圓白潤血色全消矣衛統於肺而外司皮毛衛虛則泡殼清薄衛盛則泡殼蒼厚陽氣醇濃霧灑煙霏遊溢升騰鬱郁藹藹衛氣全升經熱盡泄於痘泡之內郁消熱化殼硬皮焦痂落瘡平初於經臟無傷也太陰盛而陽明虛則營陰外閉而衛不能發縱竭力升發而群陰障蔽不得外達血色迷濛久而莫消衛氣鬱抑勢必內陷衛陷則痘粒癢塌而命殞矣衛鬱則紅變而紫衛陷則紫轉而黑庸愚見其紅紫以為血熱毒深而用涼解之劑助其內陷赤子夭殤禍流千載念之眥裂冠沖輒欲死鞭其尸生拔其舌悠悠蒼天此恨何極也參耆丹桂紅藍湯人參二錢黃耆二錢桂枝一錢芍藥一錢甘草一錢丹皮二錢紅花一錢流水煎半杯熱服治色紅過經不退者發紫變黑頂平根散痘粒初生營陰閉束衛氣衝發紅點外形及至衛氣盛發突圍而出營血退縮周外環繞痘泡圓白紅根如線其紅根之緊細者衛氣之沖逼也其白泡之豐圓者營血之斂束也此為營衛之俱盛營衰則紅根散漫斂束不緊衛衰則白頂灰平升發不快營衛俱衰則頂平而根散不能圓緊也其衛氣更虛者重圍不透血色終存衛氣怫鬱燥悶煩渴則紅變而紫及其陷沒則紫變而黑其極虛者一郁遂陷不作熱煩則紅變而黑紫不久駐其紅其紫其黑皆陰盛陽虛衛氣不能外發也參耆桂麻湯人參二錢甘草一錢黃耆三錢桂枝一錢升麻一錢流水煎半杯溫服治頂平者參歸芍藥湯人參一錢甘草一錢當歸三錢芍藥三錢醋炒流水煎半杯溫服治根散者參耆藍蘇石膏湯人參三錢甘草一錢黃耆三錢石膏二錢蘇葉三錢紅花二錢升麻一錢丹皮一錢流水煎半杯溫服治色紫而煩渴者如無煩渴去石膏郁重粒多矇頭鎖項抱鼻環唇腫消眼閉痘病營閉衛郁郁輕者稀郁重者密密之極者衛郁不能盡發危證也此當用清補溫散之劑使衛旺表疏陽郁盡發不至死也矇頭鎖項者足三陽之不降也手之三陽自手走頭足之三陽自頭走足而總由於項陽根下弱營陰閉束經氣不降故頭項偏多太陽在後陽明在前少陽在側各有其部而悉緣陽明之弱陽明者三陽之長陽明不降故太少二陽逆行而上也抱鼻環唇者陽明之不降也手足陽明之經挾鼻環唇陽明不降故環抱於口亦以陽明之虛也四肢秉氣於脾胃脾旺則氣達手足之掌胃旺則氣達手足之背足之三陰皆隨太陰而上升足之三陽皆隨陽明而下降太陰主營陽明主衛痘者衛氣之郁發則關乎陽明而不關乎太陰衛氣晝行於六陽夜行於六陰手足背外之痘陽明之氣也手足掌內之痘亦陽明之氣也陽明旺則發布於手足陽明虛則上壅於頭面此當補陽明以壯衛氣使衛氣四達亦可生也其升發之時郁重粒多頭面偏密者膚腫眼合自是常事若腫消而眼閉者即衛氣之陷也亦當補陽明以益衛疏太陰以開營使營散而衛發萬無一失也參耆姜蘇石膏湯人參二錢甘草一錢黃耆三錢石膏一錢大棗三枚蘇葉三錢生薑一錢流水煎半杯溫服治痘密者參甘苓夏湯人參三錢甘草二錢茯苓三錢半夏三錢流水煎半杯溫服治痘抱鼻環唇者參耆麻桂紅藍湯人參三錢甘草一錢黃耆三錢桂枝一錢丹皮一錢紅花一錢升麻一錢流水煎半杯溫服治腫消眼閉者陽明腑證潮熱譫語腹痛便祕痘粒外發全賴陽明之旺陽氣太盛則自陽明之經而入陽明之腑寒疫陰盛而入臟者多陽盛而入腑者少痘病之死皆由陰盛而陽陷也陽盛入腑萬不一死是為上吉但腑燥便結陽氣過亢亦當滋其腸胃以救臟陰不可輕用承氣傷寒表證未解誤服下藥陷其表陽則生結胸心痞諸變寒疫亦然痘病衛氣升達最忌表陽內陷承氣之證未易多見也設其譫語潮熱腹痛便澀恐其土燥陰亡不得不瀉則以承氣而加滋潤之藥下其糟粕以瀉胃熱而不至傷其精氣自非然者硝黃枳朴寒瀉脾胃之劑不宜孟浪也蓋大人寒疫而傳胃腑胃陽郁發毛理蒸泄表寒盡解全是內熱汗去土焦燥糞堵塞不用攻下胃火燔蒸無從泄越遲恐三陰枯槁精液消亡故有緩攻之法又有急下之條小兒寒束表密汗液未亡金土燥熱不至如大人之甚緩攻之疾固宜詳審急下之病更當斟酌以承氣之法能亡陽盛之微陰最瀉陰盛之微陽小兒一線生陽甚易撲滅而痘粒發達專憑胃氣倘其一下而衛陷則大事壞矣天地蓯蓉湯生地三錢天冬二錢甘草一錢生肉蓯蓉三錢麻仁二錢炒研白蜜半杯阿膠二錢炒研當歸二錢流水煎一杯分服治陽明腑證胃燥便結不必攻下者傷寒表寒未解無服承氣之法服則表陽必陷禍變即生小兒痘病以不得汗泄故衛氣鬱沖而發顆粒無表解出痘之理而痘粒升達全恃衛氣衛氣發越專賴胃陽一服下藥胃陽敗瀉衛氣必陷竊謂痘病必無服承氣之法設其胃燥便結確有下證用蓯蓉滋潤腸胃以滑大便不可輒用寒瀉也小承氣加生地蓯蓉湯大黃三錢厚朴二錢炒枳實二錢炒肉蓯蓉三錢生地三錢白蜜半杯流水煎大半杯分熱服調胃承氣加生地蓯蓉湯大黃二錢甘草一錢芒硝二錢肉蓯蓉三錢生地三錢白蜜半杯流水煎大半杯分熱服大承氣加生地蓯蓉湯大黃三錢枳實二錢芒硝二錢肉蓯蓉三錢生地三錢白蜜半杯厚朴二錢流水煎大半杯分熱服痘病陽盛則吉陰盛則凶凡諸死證皆由陰盛而衛陷斷無陽旺而人亡者寒疫臟寒者多腑熱者少即其陽旺入腑而表寒未解亦無服下藥之法余謂痘家縱有承氣證必不可服承氣湯存此承氣三法以備非常之變非為尋常痘證設也乃有妖魔下鬼無知造孽妄作瑣言正宗諸書以禍天下群愚貿昧醉夢習之動以大劑硝黃斃人性命天道神明人不可以妄殺此輩只可擔糞何敢業醫窮凶肆虐罪大惡極生無人誅死逃鬼責吾不信也少陽經證驚悸吐泄寒戰發熱少陽之經在筋脈之分肌肉之內陽明經病以次相傳三日則及少陽其經自目循耳行身之側下頸而合缺盆由胸而走脅肋從相火化氣右降而歸癸水病則經氣不降逆克戊土陽明壅塞心胸滿脹愈阻少陽降路遂與陽明之經痞結心胸脅肋之間故有脅痛心痞之證相火上炎濁氣升騰故有口苦咽乾目眩耳聾之條戊土困於甲木胃腑逼窄水穀莫容故作吐泄吐泄亡陰則入陰明之腑吐泄亡陽則入太陰之臟入臟入腑裡氣鬱滿而表氣壅礙則有少陽諸證若臟腑松暢中氣調和但傳少陽之經諸證不作也少陽甲木生於壬水而降於癸水而其下行則隨戊土戊土下降而甲木從之水土栽培根本不搖是以膽壯陽明既病兩經俱逆膽木虛飄故生驚悸位居陽明之裡太陰之表太陰主營陽明主衛營陰外束衛氣欲出鼓蕩振搖則為寒戰衛氣鬱發陽勝而熱則寒往矣勝極而衰營陰閉藏又復如初陰勝而寒則熱往矣故少陽之經有寒熱往來之證營衛相爭久分勝負寒勝則入於太陰熱勝則入於陽明入於陽明則有生而無死入於太陰則有死而無生其入臟入腑或死或生之機總卜寒熱之勝負當其熱來而寒往即為陽勝之徵及其熱往而寒來便是陰勝之候最可慮者寒來而熱不能來熱往兩寒不能往也其在大人寒戰而熱來即望汗解其在小兒寒戰而熱來即望痘生往來寒熱勝負之際不可以不察也小柴胡湯柴胡三錢黃芩一錢人參一錢甘草一錢半夏三錢生薑二錢大棗三枚流水煎半杯溫服治寒熱嘔吐者柴胡芍藥石膏湯柴胡三錢黃芩三錢人參一錢甘草一錢半夏二錢生薑二錢大棗三枚芍藥二錢石膏二錢生研流水煎大半杯分溫服治少陽熱勝半入陽明者柴胡桂枝幹薑湯柴胡二錢半夏二錢人參一錢甘草一錢生薑二錢大棗三枚乾薑二錢桂枝一錢流水煎半杯溫服治少陽寒勝半入太陰者少陽居陰陽之半半表陽旺則熱勝而入腑半里陰旺則寒勝而入臟吉凶生死悉判於此庸愚妄作以寒戰為內熱而用瀉下此輩昏狂獰惡不安下愚敢肆凶頑以禍蒼生可恨也太陰經證腹滿心痞嘔吐泄利痘病四日但傳太陰之經不入太陰之臟此為順證陰勝寒作則入於臟傷寒痛滿吐利之條次第發矣傷寒太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之則胸下結硬蓋太陰以濕土主令固有臟寒四逆之證傷寒太陰以其臟有寒故也當溫之宜服四逆而陽敗濕淫實為脾病之根濕者脾土之本氣寒者腎水之客氣究之己土之濕亦緣癸水之旺戊土降於火位故其性燥己土升於水分故其性濕土生於火而火死於水火勝而土燥則土能剋水水勝而土濕則水反侮土火土雙敗水邪凌侮是以脾臟濕寒也濕旺而燥衰寒增而熱減則太陰日勝陽明日負營血日長衛氣日消痘家癢塌黑陷之根全由於此凡諸死證無不緣於脾陰勝而胃陽負也治太陰之臟養中扶土補丁火而瀉癸水無逾於茯苓四逆一方矣茯苓參甘厚朴湯人參一錢甘草一錢乾薑一錢茯苓三錢桂枝一錢厚朴一錢流水煎半杯溫服治太陰腹滿者苓桂參甘椒附湯人參一錢甘草一錢桂枝一錢茯苓三錢蜀椒一錢附子二錢芍藥一錢粳米半杯流水煎半杯溫服治太陰腹痛者參甘姜苓半夏湯人參一錢甘草一錢茯苓三錢乾薑一錢半夏二錢生薑一錢流水煎半杯溫服治太陰嘔吐者茯苓四逆加石脂湯人參二錢甘草一錢乾薑二錢附子二錢茯苓三錢赤石脂一錢生用流水煎半杯溫服治太陰泄利者少陰經證咽痛吐泄蜷臥四逆發癢黑陷便血便膿潰爛無痂痘疔堅石痘病五日但傳少陰之經不入少陰之臟此為順證火敗寒勝則入腎臟傷寒少陰欲寐蜷臥惡寒四肢厥逆咽痛吐利之條陸續見矣少陰從君火化氣病則水勝而火敗寒長而熱消必至之勢也少陰脈循喉嚨寒水上凌相火失根甲木逆沖是以咽痛寒水侮土中氣崩潰胃逆則嘔脾陷則利陽動而陰靜陰勝陽奔水旺火熄故蜷臥惡寒而但欲寐也脾胃並主四肢寒水侮土四肢失溫故手足厥逆陽勝則衛氣發達而肌膚鮮華陰勝則衛氣淪鬱而皮毛黎黑衛氣幽埋不能發越故鬱而為癢既不外發則當內陷勢無中立之理是以癢則必塌而黑則必陷也水寒土濕風木鬱陷疏泄不藏是以便血濕寒凝澀膏血腐敗風木失榮是以下膿衛氣者所以熏膚而充身衛肌腠而斂皮毛陽虛衛敗則肌膚失其收斂潰爛而無痂殼陽性松活陰性石堅寒水堅凝而石故主痘疔陰莫盛於少陰所謂腎者主水受五臟六腑之精而藏之素問語故陰氣獨盛痘家死證悉以腎陰之盛也甘桔元射湯甘草二錢桔梗二錢元參一錢射干一錢流水煎半杯熱服治少陰咽痛者茯苓四逆湯茯苓三錢人參一錢甘草一錢乾薑二錢附子二錢流水煎半杯溫服治蜷臥惡寒四肢厥冷者嘔吐加半夏生薑泄利加赤石脂與太陰同法苓桂參甘耆附麻蘇湯人參三錢甘草一錢茯苓三錢桂枝二錢黃耆三錢附子二錢升麻一錢紫蘇三錢流水煎半杯溫服治癢塌黑陷者桂枝芍藥黃土湯甘草一錢白朮二錢附子二錢阿膠一錢生地一錢桂枝一錢芍藥二錢灶中黃土三錢流水煎半杯溫服治便血者桃花湯乾薑三錢粳米半杯赤石脂三錢流水煎至米熟取半杯入赤石脂末五分溫服治便膿血者苓桂參甘黃耆湯人參一錢甘草一錢茯苓二錢桂枝一錢黃耆三錢流水煎半杯溫服治潰爛無痂者參甘桂附紅藍湯人參一錢甘草一錢茯苓三錢桂枝一錢附子二錢紅花二錢蘇葉二錢流水煎半杯溫服治痘疔堅石者先用銀針刺之後服此湯厥陰經證氣衝心痛咽疼消渴嘔吐泄利便血便膿腹痛腰痛厥逆發熱疳瘡癰膿痘病六日但入厥陰之經不入厥陰之臟此為順證木鬱風動則入肝臟傷寒厥陰氣衝心疼咽痛腰痛消渴嘔利厥逆發熱之證必當漸生厥陰以風木主令土濕水寒木鬱風生郁衝於上則心疼咽痛嘔吐消渴之條見郁陷於下則腰疼腹痛泄利膿血之病作厥陰之脈自足走胸貫膈而循喉嚨上入頑顙衝於胸膈則心為之疼衝於頏顙則咽為之痛木鬱蠹化則吐蛔蟲木敗胃逆則嘔水穀木陷於土郁衝於前則病腹痛木陷於水郁衝於後則苦腰痛血藏於肝谷消於脾土敗木賊風令疏泄脾傷則清穀不止肝傷則便血不收厥陰風木生於癸水而孕丁火實為水火之中氣中氣既病故水火不交上熱而下寒水勝則發厥火復則發熱少陰水勝而火敗故病甚則多死厥陰水終而火復故病劇而或生蓋以陰極陽回往往見絶而蘇其厥逆者死機也其發熱者生兆也而陽回熱發往往太過熱鬱於上則咽痛而吐膿血熱鬱於下則腹痛而便膿血熱鬱於經則隨在而發癰膿凡疳瘡剝蝕唇齒消爛癰膿腐潰手足卷屈者皆厥陰之熱淫也厥陰之經循喉嚨之後連目系上出額與督脈會於顛下頰而環唇故疳生於唇口厥陰主筋諸筋皆會於節膝踝肘腕者筋骨之關節故癰生於肘膝緣衛郁不能外發一得厥陰之熱淫蒸腐化則生瘡癰然雖熱過營傷而陽回痘發衛氣不陷亦為厥陰之功痘傳厥陰之臟半死半生當於厥熱勝復之際先事預防也甘桔柴苓湯甘草一錢生桔梗二錢柴胡一錢黃芩一錢流水煎半杯溫服治咽痛者風盛咽燥加生地白芍參甘歸芍栝蔞湯人參一錢甘草一錢生當歸一錢芍藥二錢生地一錢栝蔞根三錢流水煎半杯溫服治消渴者苓桂參甘芍藥附子湯人參一錢甘草一錢茯苓三錢桂枝二錢附子二錢芍藥二錢流水煎半杯溫服治腰痛腹痛者苓桂參甘歸附湯人參一錢甘草一錢茯苓三錢桂枝二錢附子二錢當歸二錢流水煎半杯溫服治厥逆不止者吐泄治同太陰當歸芍藥地黃湯甘草一錢生芍藥三錢生地三錢當歸一錢流水煎半杯溫服治發熱太過者芍藥黃土湯甘草一錢白朮一錢附子一錢阿膠一錢地黃一錢芍藥二錢黃芩一錢灶中黃土三錢流水煎半杯溫服治便血者痘家便血者死以水寒土濕而木陷也宜暖水燥土而清風木白頭翁湯白頭翁二錢黃連一錢黃柏一錢秦皮一錢流水煎半杯溫服治便膿者土虛木燥腹痛脅痛者加甘草阿膠地黃芍藥芩柏湯甘草一錢生芍藥二錢生地一錢元參二錢黃芩一錢黃柏一錢流水煎半杯溫服治疳瘡者外以黃連石膏甘草青黛等分研細時時塗之甘草歸地湯甘草一錢生當歸一錢生地一錢芍藥二錢桔梗二錢元參二錢丹皮二錢黃芩一錢流水煎半杯溫服治癰膿者三陰治法痘家日傳一經六日而至厥陰陽平而不入於腑陰平而不入於臟經盡衛發此勿藥而有喜者補瀉之法俱不可用但須發表而已陽盛則離經而入腑陰盛則離經而入臟入腑者有吉而無凶入臟者少生而多死此與傷寒寒疫之證一也而痘家之三陰更為危險以其表寒閉束甚於大人衛氣難發而易陷死者十九也凡病腑熱則宜寒瀉臟寒則宜溫補此定法也而痘家一證則但有溫補之法而無寒瀉之條蓋傷寒攻下皆在表解之後痘家未有表解之時是無可攻下之日也若陰盛入臟而溫補及時十猶救五若溫補後期則九死一生若稍用寒涼則百不一生矣臨痘證者貴於在經而先覺不貴於入臟而後喻救之於履霜之前則為良工挽之於堅冰之後是為下士也庸工謬妄痘理微妙賢智不解況中古醫工庸愚凡陋何足知此其於古先聖哲言之諄切者猶且背馳千里況此之未經論著者乎其荒唐訛謬不必責也至於瑣言正宗之類巨惡元凶罪深孽重而俗子庸夫群而習之以扇其虐醜類凶徒久而愈繁此生靈之大禍仁人之深憂極當劈版焚書不可留也
