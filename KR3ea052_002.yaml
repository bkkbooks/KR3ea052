body:
  text: 卷二外感之邪秋冬傷寒春夏病溫寒溫之外乃有疫癘天地違和人物罹殃州里相傳死亡繼踵慘目傷心莫甚於此念此身世長不百齡風霾夭骨霜露雕年益以醫藥差訛調攝乖方人壽幾何那復堪此仲景傷寒垂法宏濟百代人亡義晦復無解者況於疫癘先師無言著書立説之家甚於瘟魔制方用藥之人殘於癘鬼丈夫有志燮理無權永念來者情何能已作疫病解疫病解第二疫病原始中風傷寒外感風寒而寒熱陰陽視乎本氣是以人不皆病而病不皆同半由客邪而半關主氣疫癘感於歲氣之偏鄉里傳染證狀皆同少由主氣而多屬客邪蓋天地有六氣風火暑濕燥寒也歲有五運土金水木火也天之六氣隨五運而迭遷地之六氣亙千古而不變五運回周以天之六氣合地之六氣客主加臨大過不及之數見焉由是生克勝復亢害承製之變參差不一而歲氣於焉不正人與天地相通也一氣不正而人氣感之而一經之病見焉風淫則病在厥陰火淫則病在少陰濕淫則病在太陰暑淫則病在少陽燥淫則病在陽明寒淫則病在太陽同氣相感也木火病則傷在血分金水病則傷在氣分土者氣血之中血化於己土而氣化於戊土血傷則己土病氣傷則戊土病也寒溫病異疫病之邪雖備六氣而寒溫為多溫疫感春夏之風寒疫感秋冬之寒風為陽邪感則傷陽寒為陰邪感則傷陰衛氣為陽故中於風營血為陰故傷於寒平人衛氣在外而內交於營營血在內而外交於衛營衛調和是以無病風傷衛氣則遏閉營血而生內熱寒傷營血則裹束衛氣而生外寒營衛不調是以病也衛傷而內郁其營故風雖傷衛而病實在血營傷而外束其衛故寒雖傷營而病實在氣血病者多傳陽明而為熱以血藏於肝而肝木生火火盛則陽旺而入腑也氣病者多傳太陰而為寒以氣藏於肺而肺金生水水盛則陰旺而入臟也溫疫之家陰氣不衰足以濟陽則但傳陽經而不入陽明之腑寒疫之家陽氣不衰足以濟陰則但傳陰經而不入太陰之臟是謂順證六日六經俱遍邪退正復則表解而病愈矣表裡殊法病在營衛皮毛閉祕法宜解表以發內郁營衛外發則生內陷則死風傷衛氣衛閉其營營血外發則斑生而病解寒傷營血營閉其衛衛氣外發則汗出而病愈溫疫傳腑腑熱則營血內陷而不外發寒疫傳臟臟寒則衛氣內陷而不外發故溫疫營病臟陰旺者多生腑陽盛者多死寒疫衛病腑陽旺者多生臟陰盛者多死溫疫傳腑當清其腑熱以發營血寒疫傳臟當溫其臟寒以發衛氣營司於肝而實生於太陰臟陰旺則外發溫疫之家非陰盛之極者不可輕瀉其脾精衛司於肺而實化於陽明腑陽旺則外發寒疫之家非陽盛之極者不可輕瀉其胃氣也溫疫由來溫疫之證發熱出汗得之於風其年木火不能發泄則人氣應之多病溫疫以孔竅閉而風氣泄之也木火生長因乎陰氣之左升蓋純陰之位而一陽已生陽生必升升則溫暖而化風木積溫而熱是為君火溫則生而熱則長陽氣敷舒於九天之上孔竅發宣而不闔故弗傷於風木火不能發泄則陽氣下郁而生內熱經絡閉塞孔竅不開是以易中於風天人同氣天地之木火不能發泄人物應之而病溫疫故多病於春夏其病於春者傷在乙木其病於夏者傷在丁火也寒溫殊病溫病感在經絡而內有積熱前三日則在三陽之經後三日則入三陰之臟既入於臟必入於腑其入腑入臟總是熱而非寒傷寒感在經絡而內無積熱陽盛而後入腑陰盛而後入臟入腑則是熱入臟則是寒溫疫亦感在經絡而內無積熱陽盛者亦入於腑陰盛者亦入於臟第未嘗必入於腑必入於臟而病內熱其較溫病不同然營鬱而熱盛但有入腑而病熱必無入臟而病寒者其較傷寒亦不同故溫疫為病止有寒瀉之法而無溫補之條其在三陰皆六日傳經之證與傷寒三陰臟寒之證天淵不一也凡經盡而斑發者是但在經絡而未入於腑也若經盡而斑不發必有內郁之證表藥之中必兼涼瀉內熱既清則營達而斑發矣表解熱除風性疏泄氣性收斂風傷衛氣開其腠理氣欲內斂風欲外泄氣閉於內則營鬱而為熱風泄於外則竅開而為汗風愈泄而氣愈閉營熱日積待至六經既盡斑點外發而後血分之熱泄若氣閉而不泄則營熱內郁而生燥悶五臟燔蒸而人死矣或泄之不透隱見於皮膚之間必鬱而為癢癢者是謂隱疹隱疹之家血熱蘊積久而肌肉潰腐發為痂癩所謂脈風者也當涼血發表使營熱外達不令內蒸也陰衰營陷溫疫之病在於血分風本傷衛衛傷而閉其營血是以病在血分肝藏營血而太陰為生血之本脾以陰土而含陽氣脾陽一升則溫暖而化肝木溫疫之病非第在肝而實連於太陰脾陰不弱足以滋潤其營血則營郁外達而斑點生太陰脾臟以濕土主令陰衰傳腑濕化為燥陽旺而生裡熱則營氣內陷而不外達溫疫之死死於脾陰之弱火上燥熱而營郁不能達也太陽經證發熱頭痛太陽之經總統營衛風傷衛氣遏閉營血郁迫而生裡熱肝木藏血而生火火者血中溫氣蓄積而化熱也太陽寒水之經應當惡寒以營鬱而生火故但熱而不寒其經自頭走足行身之背經逆而不降故頭痛而項強也浮萍湯浮萍三錢丹皮三錢芍藥三錢甘草二錢炙生薑三錢切大棗三枚劈流水煎大半杯熱服覆衣取汗治一日太陽溫疫發熱頭痛者溫疫得之中風亦是桂枝湯證但發於春夏之月但熱無寒不宜桂枝辛溫故以浮萍瀉衛氣之閉丹皮芍藥瀉營血之郁也身痛脈緊煩躁無汗溫疫在太陽之經脈浮頭痛發熱汗出以風強而氣不能閉也若脈浮而緊發熱惡寒身痛腰痛煩躁無汗而喘促者是氣強而風不能泄也蓋寒疫無汗溫疫有汗以寒性閉藏而風性疏泄也若衛陽遏閉風不能泄營郁莫達則煩躁喘促與傷寒同證宜以浮萍石膏清散經絡之熱也浮萍石膏湯浮萍三錢石膏三錢生研杏仁三錢泡去皮尖甘草二錢炙生薑三錢大棗三枚劈流水煎大半杯熱服覆衣治溫疫身痛脈浮緊煩躁喘促無汗者煩熱燥渴病在太陽之經未入陽明之腑不至遽生煩渴若陽明燥盛之人經熱外逼燥熱內應則見煩渴陽明從燥金化氣腑燥發作故有煩熱便難之證而腑燥未作經燥先動是以煩渴生焉其太陽表證未解宜浮萍石膏清金而解表絶其煩熱入腑之源表證已解第以白虎加元麥湯清燥而生津氣虛者加人參以益氣以表解陽虛恐其燥去而陽亡也白虎加元麥湯石膏五錢知母三錢甘草二錢炙粳米一杯元參三錢麥冬八錢流水煎至米熟取大半杯熱服治溫疫太陽經罷煩熱燥渴者人參白虎加元麥湯石膏五錢知母三錢甘草二錢炙人參三錢元參三錢麥冬八錢粳米一杯流水煎至米熟取大半杯熱服治溫疫太陽經罷氣虛煩渴者陽明經證目痛鼻乾嘔吐泄利三陽之經陽明為盛足陽明從燥金化氣太陽表邪不解經熱內傳火性就燥必入陽明陰盛於裡而陽盛於表腑燥未作經燥先動熱論二日陽明受之其脈挾鼻絡於目故身熱目痛而鼻乾不得臥是皆經絡燥熱之證也陽明主降戊土右降則金水收藏相火歸根故上焦清空而善容陽明不降金水失其收藏膽木逆行相火上炎肺金被克故目痛而鼻乾膽木逆行而賊胃土胃氣壅遏不能容受故嘔吐而泄利緣經邪郁迫其腑氣故也浮萍葛根湯浮萍三錢葛根三錢石膏三錢元參三錢甘草三錢生薑三錢流水煎大半杯熱服治溫疫陽明經證目痛鼻乾煩熱不臥者浮萍葛根芍藥湯浮萍三錢葛根三錢石膏三錢元參三錢甘草二錢炙芍藥三錢生薑三錢流水煎大半杯熱服治溫疫陽明經證泄利者浮萍葛根半夏湯浮萍三錢葛根三錢石膏三錢元參三錢甘草三錢芍藥三錢半夏三錢生薑三錢流水煎大半杯熱服治溫疫陽明經證嘔吐者陽明腑證潮熱汗出譫語腹痛便祕病傳陽明之經不得汗解腑陽素旺之人以經熱鬱蒸而腑熱內作開其皮毛則見大汗至於手足淋漓表邪盡解全是內傷矣經氣發舒無復郁迫腑氣松暢吐利皆安汗愈泄而土愈焦燥愈增而熱愈盛每至申酉之交應時發熱如潮汐不爽是謂潮熱燥土消爍心液於是譫語燥矢壅遏腑氣於是滿痛遲則臟陰耗亡營氣鬱陷生死攸關不可不亟下也瀉以大小承氣而加養陰涼血之味臟陰續復營郁外達矣調胃承氣加芍藥地黃湯大黃三錢生甘草二錢芒硝三錢芍藥三錢生地八錢流水煎一杯去渣入芒硝火化溫服小承氣加芍藥地黃湯大黃五錢生厚朴三錢生枳實三錢炒芍藥三錢生地一兩流水煎一杯溫服不便再服大承氣加芍藥地黃湯大黃八錢生芒硝三錢厚朴四錢枳實四錢芍藥三錢生地一兩二錢流水煎一杯去渣入芒硝火化溫服不下再服少陽經證目眩耳聾口苦咽乾胸痛脅痞嘔吐泄利溫疫二日陽明經熱不解三日則入少陽之經少陽以相火主令足少陽以甲木而化氣於相火傷寒之口苦咽乾而目眩者皆相火之上炎也其經自頭下項行身之側熱病之胸脅痛而耳聾者皆膽木之逆行也少陽在二陽之裡三陰之表陰盛則傳太陰之臟陽盛則傳陽明之腑少陽者入腑入臟之門戶也溫疫營鬱熱盛火旺木枯但傳胃腑而為熱不入脾臟而為寒傳胃則木邪逼土腑氣鬱遏而生吐利是宜清散經邪杜其入腑之路也柴芩栝蔞芍藥湯柴胡三錢黃芩三錢半夏三錢甘草二錢生生薑三錢大棗三枚劈芍藥三錢栝蔞根三錢流水煎大半杯熱服覆衣飲熱粥取微汗治少陽經溫疫目眩耳聾口苦咽乾胸痛脅痞者大柴胡加元參地黃湯柴胡三錢黃芩三錢半夏三錢芍藥三錢枳實三錢大黃三錢生薑三錢大棗三枚元參三錢地黃三錢流水煎大半杯溫服治少陽經溫疫傳陽明胃府嘔吐泄利者三陽傳胃溫病三陽經病營鬱熱盛勢必內傳胃腑而胃陽素旺燥熱感發經腑同氣表裡俱病腑熱內遏而臟陰消爍過經不解則臟腑鬱蒸而人死矣溫疫所最忌者營熱不能外泄其不外泄之由全以衛盛而營衰脾陰虛而胃陽旺也若脾陰不衰胃陽雖旺六經既遍邪欲內傳而臟氣捍格熱無內陷之隙則蒸泄皮毛發為斑點而病解焉溫疫之斑發而不死者臟陰充足外御經邪而熱不內陷也若一入胃腑腑陽日盛則臟陰日枯不得不用瀉法緩則瀉於經盡之後急則瀉於經盡之前腑熱一清則經熱外達而紅斑發矣太陰經證腹滿嗌乾太陰以濕土主令其經自足走胸行身之前溫疫營鬱熱盛三陰之經化氣於三陽故病傳大陰則腹滿而嗌乾陽明之燥氣太亢則營熱內蒸而殞性命太陰之濕氣不枯則營熱外達而生斑點溫疫所最懼者濕衰而燥勝也太陰經病脾陰足以濟胃陽則營熱不至於內蒸自然發越於皮毛矣浮萍地黃湯浮萍三錢生地三錢丹皮三錢芍藥三錢甘草二錢生薑三錢大棗三枚流水煎大半杯熱服治溫疫太陰經證腹滿嗌乾者少陰經證口燥舌乾少陰以癸水而化君火其經自足走腰行身之後溫疫發於春夏相火得令之時火勝水衰故口燥舌乾而渴丁火太亢則營鬱而內焚癸水不枯則斑生而熱退溫疫之所最懼者水敗而火勝也少陰經病腎水可以支相火則營熱不至於內焚自然宣泄於孔竅也浮萍天冬湯浮萍三錢天冬三錢生地三錢元參三錢丹皮三錢生薑三錢栝蔞根三錢流水煎大半杯溫服治溫疫少陰經證口燥舌乾而渴者厥陰經證煩滿發斑厥陰以風木主令其經自足走胸行身之側循陰器而絡肝故煩滿而囊縮厥陰肝木司營血而胎君火溫疫之病受在營血則傳至厥陰邪熱斯甚若木榮血暢經臟潤澤營熱不能內傳六經即遍別無去路則鬱極而發蒸泄皮毛而見紅斑若營氣虛弱不能遽發過時斑見而色帶紫黑則多至不救以其經熱鬱蒸後期而發營血傷敗失其華鮮也是宜清解涼血使其營熱發達此治厥陰溫疫之定法也浮萍當歸湯浮萍三錢當歸三錢生地三錢丹皮三錢芍藥三錢甘草三錢生生薑三錢流水煎大半杯熱服治溫疫厥陰經證煩滿發斑者六經治法溫疫營鬱血熱六日而至厥陰六經既盡陰氣續復血熱外達應見紅斑斑生則熱退而病解矣紅斑之後繼以白斑紅斑者營血之外發白斑者衛氣之外泄寒疫營閉而衛郁溫疫衛閉而營郁營開而衛泄則為汗衛開而營發則為疹小兒寒疫皮膚緻密不得汗泄則衛氣升騰衝突皮膚而為痘溫疫則大人小兒皆生疹點無有異也溫疫之感全在少陽厥陰兩經厥陰職司營血而營中之伏熱則少陽之相火而非但乙木所胎之君火也若未滿六日而表證已解血熱未深止是汗出尚無紅斑也六日而傳厥陰血熱已深是以表解而斑紅若六日之外過時而後斑發營血鬱蒸紅轉而紫紫變而黑則十不救一治法六日之內總宜透發肌表以瀉血熱至六日經盡之後表藥更當急進刻不可緩也血熱不泄立致殞亡即泄之不透隱見於皮膚之間亦生風癩之疾非細故也停水不消溫疫固無入臟生寒之證然亦不皆入腑而生內熱其臟不寒而腑不熱而經熱燔蒸木火枯燥煩渴飲冷不能禁止水積胃腑停蓄不消於是腹脅脹滿小便不利以土濕木鬱疏泄之令不行也凡腑陽非旺而病溫疫無有不停水之證此在傷寒便是三陰四逆真武諸病以溫疫經熱勝其臟寒故內寒不作然至積水不消則臟陰較甚於腑陽矣其表證未解當以豬苓湯加浮萍表裡雙解之表解而斑發則但以豬苓瀉其積水也豬苓湯豬苓三錢茯苓三錢澤瀉三錢滑石三錢研阿膠三錢炒研流水煎大半杯入阿膠消化溫服寒疫由來寒疫之證寒熱無汗得之於寒其年金水不能斂藏則人氣應之多病寒疫以孔竅開而寒氣閉之也金水收藏因乎陽氣之右降蓋純陽之位而一陰已生陰生必降降則清涼而化燥金積涼成寒是為寒水涼則收而寒則藏陽氣封蟄於九地之下皮毛祕密而不開故弗傷於寒金水不能斂藏則陽氣上郁而生外熱腠理發泄皮毛不閉是以易傷於寒天人同氣天地之金水不能斂藏人物應之而病寒疫故多病於秋冬其病於秋者傷在庚金病於冬者傷在壬水也表裡同異寒疫有傳經之證傳經者前三日則在三陽後三日則在三陰六日六經人所同也亦凡感病所同也有傳腑傳臟之證傳腑者不拘何日陽盛則內傳陰盛者不入於腑傳臟者不拘何日陰盛則內傳陽盛者不入於臟人所不同也亦凡感病所不同也蓋溫病原有內熱必傳臟腑不論傳腑傳臟皆是熱證傷寒原無內熱陽旺而後傳腑陰旺而後傳臟入腑則為熱入臟則為寒溫疫亦無內熱然營鬱熱盛陽旺之家則有入腑之熱陰旺之家亦無入臟之寒寒疫亦無內熱亦無內寒不必定入於腑不必定入於臟但人不皆陽盛不皆陰盛不皆陽虛不皆陰虛故或入於腑或入於臟或不入腑或不入臟人各不同法與傷寒無殊但疫感天氣之非正淫泆纏綿較之傷寒頗難驅逐而其入臟入腑亦半關歲氣之偏不盡由人氣也表解寒散寒性閉澀血性發揚發揚則竅開閉澀則竅闔平人之氣營陰在內衛陽在外寒傷營血閉其皮毛衛氣陷於營陰之內營陰閉藏則生表寒其陽盛者三陰臟氣從陽而化熱其陰盛者三陽經氣從陰而化寒陽盛則衛氣外發而汗出陰盛則衛氣內陷而人亡故寒疫之病陽盛而外熱者吉陰盛而內寒者凶緣其病愈必須汗出而其汗出全賴陽旺使其裡氣平和則但可解表勿輕用硝黃誤下以陷其衛陽也若其里陽素盛而表寒不解以致裡熱郁發則兼清裡熱以解表寒若里陽素虛衛氣鬱淪不能外發但用表藥猶難汗解再事寒攻則衛陽愈陷禍變遂生如其里陰鬱動寒濕淫滋當速用溫燥以回陽氣稍用瀉下之劑則人隨藥斃不可活矣陽衰衛陷寒疫之病在於氣分寒本傷營營傷而束其衛氣是以病在氣分肺藏衛氣而陽明為化氣之原胃以陽土而含陰氣胃陰一降則清涼而化肺金寒疫之病非第在肺而實連於陽明胃陽不虛足以發越其衛氣則衛郁外達而毛理泄陽明胃腑從燥金化氣陽衰傳臟燥化為濕陰旺而生裡寒則衛氣內陷而不外達寒疫之死死於胃陽之虛水土濕寒而衛郁不能達也傳經大凡寒疫傳經亦與傷寒相同一日太陰二日陽明三日少陽四日太陰五日少陰六日厥陰陽性熱而陰性寒裡熱非盛不入陽明之腑內寒非盛不入太陰之臟始終在表未嘗內陷六日經盡則邪退正復汗出而愈矣其衛盛而感輕者皮毛易泄則先期而汗解其衛虛而感重者腠理難開則過期而汗解其衛弱郁深不能遽發往往振栗戰搖而後汗出寒戰者少陽之證寒戰而不能發熱者相火之虛發熱而不能汗出者表寒之盛也少陽為陰陽之樞寒極則入於太陰熱極則入於陽明故陰陽偏勝而內傳臟腑多由少陽而入入於臟腑則解無定期而動致危亡不可不慎也陽旺傳腑腑陽素盛而經氣鬱遏則裡熱感發而傳胃腑腑陽長則臟陰消凡人之病陽長則安陰長則危傷寒三陽之少死者因於陽長而陰消也病傳胃腑陽氣日長自是吉事但陽不可亢亢則陰亡而寓死機胃土燥熱攻下失期陰精枯稿亦成死證是以入腑雖吉不如在經之有吉而無凶也陰盛傳臟臟陰素旺而經氣閉束則內寒鬱動而傳脾臟臟陰進則腑陽退凡人之疾陽進則安陰進則危傷寒三陰之多死者以其陰進而陽退也病傳脾臟陰氣日進最是險事蓋陰不可勝勝則陽敗而無生望脾土濕寒溫補後時陽氣消滅則成死證是以入臟則險不如在腑之夷多而險少也太陽經證頭痛惡寒太陽之經外在皮毛實為六經之長肺藏衛氣肝藏營血而總統於太陽寒傷營血裹束衛氣不得外發故閉藏而生表寒其經自頭下項行身之背經氣上壅故頭項痛而腰脊強肺主衛氣而開竅於鼻衛氣遏閉不能外泄故逆行鼻竅而生嗽嚏衛氣逆行不得下降故胸膈鬱悶而發喘促也紫蘇湯蘇葉三錢桂枝三錢杏仁三錢泡甘草二錢炙流水煎大半杯熱服覆衣取汗治一日太陽寒疫頭痛發熱惡寒者寒疫得之傷寒亦是麻黃湯證但不盡見於冰雪之天非皆純寒未必咸宜麻黃辛溫故以桂枝瀉營血之郁蘇葉杏仁瀉衛氣之郁也血升鼻衄太陽經病不解衛郁莫泄升逼營陰則見衄證以肺主衛氣開竅於鼻衛陽遏閉不得外達經脈莫容上尋出路沖其營血是以上溢血衄則衛郁發瀉亦同汗解但營血流漓不無耗喪耳陽明傷寒脈浮發熱口乾鼻燥能食者則衄方在太陽陽明於其脈浮發熱口乾鼻燥之時早以紫蘇石膏地黃湯瀉衛鬱而涼血熱則血不上流矣紫蘇石膏地黃湯蘇葉三錢桂枝三錢杏仁三錢甘草三錢炙石膏三錢生研生地三錢麥冬三錢丹皮三錢生薑三錢切大棗三枚劈流水煎大半杯熱服覆衣取汗治寒疫太陽經病不解血升鼻衄者水氣內停太陽膀胱寒水之經太陽經病陽虛之人多有水氣停瘀之證或原無積水而渴燥飲冷蓄而不消水氣阻格肺胃上逆則眩暈而嘔咳肝脾下陷則淋澀而泄利外寒未解而里水又動久而火敗土崩則入三陰之臟是宜外發表邪而內驅寒水也蘇桂薑辛湯蘇葉三錢桂枝三錢甘草二錢半夏三錢炮芍藥三錢細辛一錢乾薑二錢五味子一錢流水煎大半杯熱服覆衣若下利加赤石脂一錢若渴者去半夏加栝蔞根三錢若小便不利加茯苓三錢若喘者加杏仁三錢若噫者加附子三錢煩躁發渴病在太陽未應煩渴設見煩渴便是將入陽明之腑以陽明燥氣因表鬱而內發也若表證已解用白虎加元麥湯清燥而生津氣虛者加人參以益氣以汗後陽虛恐其渴止而陽亡也白虎加元麥湯石膏三錢知母三錢甘草二錢粳米一杯元參三錢麥冬五錢去心流水煎至米熟取大半杯熱服治寒疫太陽經罷煩躁發渴者人參白虎加元麥湯石膏三錢知母三錢甘草二錢粳米一杯人參三錢元參三錢麥冬五錢流水煎至米熟取大半杯熱服治寒疫太陽經罷氣虛煩渴者寒疫之病臟腑易生濕寒燥熱者少然白虎證亦恆有之此法不可廢也表證未解加紫蘇三錢陽明經證嘔吐泄利陽明之經在肌肉之分皮毛之內太陽表寒未解以次相傳二日則及陽明其經挾口環唇行身之前經氣上壅故鼻乾口燥而胸滿陽明從燥金化氣太陽以濕土主令燥盛則傳腑而生熱濕盛則入臟而生寒衛氣之外發而汗解全恃乎胃陽盛而燥氣長也胃者水穀之腑一傳陽明必見嘔吐以少陽膽木本從胃土下行陽明經病不能順降則膽木上逆而克胃土胃氣壅遏失其容受之量水穀在中脘以上者則為嘔吐在中脘以下者則為泄利嘔多則胃病利多則脾病也紫蘇葛根升麻湯蘇葉三錢葛根三錢桂枝三錢芍藥三錢甘草二錢升麻二錢流水煎大半杯溫服治寒疫陽明經泄利者紫蘇葛根半夏湯蘇葉三錢葛根三錢桂枝三錢芍藥三錢半夏三錢生薑三錢甘草二錢流水煎大半杯熱服治寒疫陽明經嘔吐者乾燥發渴陽明經病而見燥渴便是將入胃腑用白虎加麥冬元參清肺金而潤臊氣虛者酌加人參蓋病入陽明燥氣必作燥必先見於庚金而後見於戊土以燥乃庚金之令氣而戊土之化氣也戊土之燥在腹庚金之燥在胸胸者辛金之位辛金本化氣於濕土陽明旺則辛金不化己土之濕而化庚金之燥是以燥見於胸大腸者庚金之腑胸燥則腸燥可知矣陽明腑證潮熱汗出譫語腹滿便祕三陽以陽明為盛經熱不解轉入胃腑陽鬱火旺必作潮熱每日申酉之交煩熱倍加如海水潮信是名潮熱熱蒸皮毛汗出表解津亡土燥糟粕焦枯不俟入腸煉成結糞堵塞下脘胃熱鬱遏上耗心液於是譫語胃氣閉壅於是腹滿遲而傷及三陰脾陰爍則唇裂腎陰枯則耳焦肝陰涸則舌短陰精竭流則人死矣是宜以承氣加元參麥冬白蜜瀉其熱而潤其燥雖用攻下而不至亡陰也調胃承氣加麥冬元參湯大黃三錢芒硝三錢甘草二錢麥冬五錢元參三錢白蜜一杯流水煎大半杯入白蜜熱服小承氣加麥冬元參湯大黃四錢厚朴三錢枳實三錢炒麥冬五錢元參三錢白蜜一杯流水煎大半杯入白蜜熱服大承氣加麥冬元參湯大黃三錢芒硝三錢枳實三錢厚朴三錢麥冬八錢元參三錢白蜜一杯流水煎大半杯入白蜜熱服少陽經證口苦咽乾目眩耳聾胸痛脅痞寒熱往來少陽甲木從相火化氣病則行其火令其經起目鋭眥上絡於耳下頸而合缺盆行兩脅而走足經氣逆升滯塞胸脅相火燔騰是以口苦咽乾目眩耳聾胸痛而脅痞也位居陽明之裡太陰之表太陰主營陽明主衛營陰外束衛氣欲出而不能鼓勃振動則為寒戰衛氣透發則汗出凡將汗而戰搖者衛弱不能遽發也衛陽內發營氣欲出而不得蓄積壅遏則為發熱營氣透發則熱退凡發熱而無汗者營郁不能外達也營衛交爭迭為勝復是以寒往而熱來寒來而熱往相爭之久勝負遂分寒勝則入於太陰熱勝則入於陽明入於太陰則陽負而多危入於陽明則陰盡而亦凶其於寒熱往來時以小柴胡雙解表裡之邪柴胡黃芩清瀉半表之陽人參甘草溫補半里之陰則無偏陰偏陽內傳臟腑之患矣小柴胡湯柴胡四錢黃芩三錢半夏三錢人參二錢甘草二錢生薑三錢大棗三枚流水煎大半杯熱服覆衣嘔吐泄利少陽經氣隨陽明戊土下降寒邪外束甲木鬱塞不能順降逆侵戊土戊土被賊遂與少陽之經痞結胸脅凡心胸痞塞脅肋硬滿之證皆少陽陽明兩經之上逆也胃主受盛戊土賊於甲木腑氣鬱遏不能容納水穀故吐利並作木賊土負中氣被傷陰虛則入陽明之腑陽虛則入太陰之臟方其木邪肆虐之時下見泄利則以黃芩湯清其相火上見嘔吐則以黃芩半夏生薑湯降其逆氣其半在少陽之經半入陽明之腑則以大柴胡湯雙解經腑之邪其半在少陽之經半入太陰之臟而下見泄利則以柴胡桂枝幹薑湯溫其濕土上見嘔吐則以柴胡桂薑半夏湯降其逆氣也黃芩湯黃芩三錢芍藥三錢甘草二錢大棗三枚流水煎大半杯熱服治寒疫少陽經胸脅痞滿泄利者黃芩半夏生薑湯黃芩三錢芍藥三錢甘草二錢大棗三枚半夏三錢生薑三錢流水煎大半杯熱服治寒疫少陽經胸脅痞滿嘔吐者大柴胡湯柴胡三錢黃芩三錢半夏三錢大棗三枚芍藥三錢枳實三錢大黃三錢生薑三錢流水煎大半杯熱服治少陽經傳陽明腑胸脅痞滿嘔吐泄利者柴胡桂枝幹薑湯柴胡三錢黃芩三錢甘草二錢桂枝二錢乾薑三錢牡蠣三錢栝蔞三錢流水煎大半杯熱服治少陽經傳太陰臟胸脅痞滿泄利者柴胡桂薑半夏湯柴胡三錢黃芩三錢乾薑三錢桂枝二錢甘草二錢牡蠣三錢栝蔞三錢半夏三錢生薑三錢流水煎大半杯溫服治少陽經傳太陰臟胸脅痞滿嘔吐者寒疫之少陽與傷寒之少陽病同而法亦不殊凡見少陽諸證非內傳於腑即內傳於臟內連臟腑而後少陽經證日久不罷方宜小柴胡湯增減治之若不連臟腑而但經絡外病則是三日少陽之證總以太陽為主第宜紫蘇湯發表無事大小柴胡湯也太陰經證痛滿吐利寒疫傳經四日而至太陰脾陰非旺終不入臟脾陰一旺則不拘何日皆可內傳太陰以濕土主令表郁濕動故病傳脾臟土濕則中氣不運傷寒太陰痛滿吐利之證俱起衛氣鬱陷皆因於此當補火燥濕以回脾陽則衛氣發宣而不陷沒矣苓桂參甘厚朴湯人參三錢甘草二錢乾薑三錢茯苓三錢桂枝三錢厚朴三錢流水煎大半杯溫服治寒疫太陰腹滿者苓桂參甘椒附湯人參三錢甘草三錢桂枝三錢茯苓三錢蜀椒三錢去目附子三錢炮芍藥三錢粳米半杯流水煎大半杯溫服治寒疫太陰腹痛者參甘薑苓半夏湯人參三錢甘草二錢茯苓三錢乾薑三錢半夏三錢生薑三錢流水煎大半杯溫服治寒疫太陰嘔吐者茯苓四逆加赤石脂湯人參三錢甘草二錢乾薑三錢茯苓三錢附子三錢赤石脂三錢生研流水煎大半杯溫服治寒疫太陰泄利者少陰經證厥逆吐泄寒疫傳經五日而至少陰腎陰非旺終不入臟腎陰一旺則不拘何日皆可內傳少陰以癸水而化君火病則水旺而火衰以水能勝火而火不勝水自然之勢也表郁寒作故病傳腎臟水寒則侮土滅火傷寒少陰厥逆吐泄之證俱起衛氣陷敗全由於此當補火瀉水以回腎陽則衛氣發達而不陷亡矣茯苓四逆加半夏湯人參三錢茯苓六錢甘草三錢乾薑三錢附子三錢半夏三錢流水煎大半杯溫服嘔吐與泄利並見加赤石脂但見泄利用茯苓四逆加赤石脂湯方在太陰四肢厥冷蜷臥惡寒而不吐泄但用茯苓四逆湯治之厥陰經證厥逆發熱消渴吐泄寒疫傳經六日而至厥陰肝陰非旺終不入臟肝陰一旺則不拘何日皆可內傳厥陰以風木主令下為腎水之子上為君火之母病則水火不交下寒上熱水勝則厥生火復則熱發厥而陽絶則死熱而陽回則蘇寒疫之在少陰但有厥逆一傳厥陰厥逆之極多見發熱其厥逆者母氣也其發熱者子氣也厥為死機熱為生兆厥熱勝復之際不可不察也風木之性疏泄而枯燥土濕水寒木鬱風動腸竅疏泄則為泄利肺津枯燥則為消渴風木者脾土之賊其死者死於水旺而土負其生者生於火旺而土勝厥陰之泄利消渴日甚不已者水勝而火息土敗而木賊也暖水以榮木補火以生土厥陰之法不外此矣茯苓參甘薑附歸脂湯人參三錢甘草二錢茯苓三錢桂枝三錢乾薑三錢附子三錢當歸三錢赤石脂三錢流水煎大半杯溫服治寒疫厥陰厥逆泄利者參甘歸芍麥冬栝蔞湯人參三錢甘草三錢生當歸三錢芍藥三錢麥冬三錢栝蔞根三錢流水煎大半杯熱服治寒疫厥陰發熱消渴者三陰治法傷寒三陰之病皆三陰臟證而非經證經證者四日太陰五日少陰六日厥陰但在三陰之經不入三陰之臟法以太陽為主不論何日總是麻黃湯證不必另立三陰之門也仲景三陰諸法原為三陰臟病而設寒疫亦然其但在三陰之經總是紫蘇湯證以其離經而入臟不得不另立專法也其傳經而不傳臟者六日經盡自能汗解緣里陽不虛衛無內陷之由正復邪衰自然外發凡過期纏綿不得汗解者皆陰盛而入臟也陽盛入腑則潮熱汗出而不解陰盛入臟則厥冷無汗而不解寒疫入腑者少入臟者多溫疫之死死於陽旺而入腑寒疫之死死於陰旺而入臟小兒痘病即大人之寒疫其陽虛衛陷痘瘡癢塌而死者皆陰盛而入臟也寒疫之感受在太陽少陰兩經寒水之氣旺感於太陽之經則傳於少陰之臟少陰主水五臟之陰莫盛於少陰太陰厥陰之病悉因少陰之水旺瀉癸水而益丁火三陰之通法也
